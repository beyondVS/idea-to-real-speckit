description = "Spec Kit 명령이 완료된 후 변경 사항을 자동 커밋합니다."

# Source: git

prompt = """
# 변경 사항 자동 커밋 (Auto-Commit Changes)

Spec Kit 명령이 완료된 후 모든 변경 사항을 자동으로 스테이징하고 커밋합니다.

## 동작 (Behavior)

이 명령어는 핵심 명령 전후의 훅(hook)으로 호출됩니다. 다음을 수행합니다:

1. 훅 컨텍스트에서 이벤트 이름을 결정합니다 (예: `after_specify` 훅으로 호출된 경우 이벤트는 `after_specify`이고, `before_plan`인 경우 이벤트는 `before_plan`임).
2. `.specify/extensions/git/git-config.yml`에서 `auto_commit` 섹션을 확인합니다.
3. 특정 이벤트 키를 찾아 자동 커밋이 활성화되어 있는지 확인합니다.
4. 이벤트별 키가 없으면 `auto_commit.default`를 사용합니다.
5. 설정된 경우 명령별 `message`를 사용하고, 그렇지 않으면 기본 메시지를 사용합니다.
6. 활성화되어 있고 커밋되지 않은 변경 사항이 있는 경우 `git add .` + `git commit`을 실행합니다.

## 실행 (Execution)

이 명령을 트리거한 훅에서 이벤트 이름을 결정한 다음 스크립트를 실행합니다:

- **Bash**: `.specify/extensions/git/scripts/bash/auto-commit.sh <event_name>`
- **PowerShell**: `.specify/extensions/git/scripts/powershell/auto-commit.ps1 <event_name>`

`<event_name>`을 실제 훅 이벤트(예: `after_specify`, `before_plan`, `after_implement`)로 교체하십시오.

## 설정 (Configuration)

`.specify/extensions/git/git-config.yml` 파일에서:

```yaml
auto_commit:
  default: false          # 전역 설정 — 모든 명령에 대해 활성화하려면 true로 설정
  after_specify:
    enabled: true          # 명령별 재정의
    message: "[Spec Kit] 기능 명세 추가"
  after_plan:
    enabled: false
    message: "[Spec Kit] 구현 계획 추가"
```

## 예외 처리 (Graceful Degradation)

- Git을 사용할 수 없거나 현재 디렉토리가 리포지토리가 아닌 경우: 경고와 함께 건너뜁니다.
- 설정 파일이 없는 경우: 건너뜁니다 (기본적으로 비활성화됨).
- 커밋할 변경 사항이 없는 경우: 메시지와 함께 건너뜁니다.
"""
