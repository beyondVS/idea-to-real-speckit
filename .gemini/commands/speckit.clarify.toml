description = "최대 5개의 고도로 타겟팅된 명확화 질문을 던지고 답변을 명세에 다시 인코딩하여 현재 기능 명세에서 미흡하게 정의된 영역을 식별합니다."

prompt = """

## 사용자 입력 (User Input)

```text
{{args}}
```

사용자 입력이 비어 있지 않은 경우, 진행하기 전에 이를 반드시 고려해야 합니다.

## 사전 실행 체크 (Pre-Execution Checks)

**확장 훅 확인 (명확화 전)**:
- 프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
- 존재한다면 이를 읽고 `hooks.before_clarify` 키 아래의 항목을 찾습니다.
- YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
- `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
- 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
  - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
  - 훅에 비어 있지 않은 `condition`이 정의된 경우, 훅을 건너뛰고 조건 평가를 HookExecutor 구현에 맡깁니다.
- 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
  - **선택적 사전 훅** (`optional: true`):
    ```
    ## 확장 훅 (Extension Hooks)

    **선택적 사전 훅**: {extension}
    명령어: `/{command}`
    설명: {description}

    프롬프트: {prompt}
    실행하려면: `/{command}`
    ```
  - **필수 사전 훅** (`optional: false`):
    ```
    ## 확장 훅 (Extension Hooks)

    **자동 사전 훅**: {extension}
    실행 중: `/{command}`
    EXECUTE_COMMAND: {command}

    Outline으로 진행하기 전에 훅 명령어의 결과를 기다리십시오.
    ```
- 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 조용히 건너뜜

## 개요 (Outline)

목표: 활성 기능 명세에서 모호함이나 누락된 결정 지점을 감지 및 감소시키고, 명확해진 내용을 명세 파일에 직접 기록합니다.

참고: 이 명확화 워크플로우는 `/speckit.plan`을 호출하기 전에 실행(및 완료)되어야 합니다. 사용자가 명시적으로 명확화 단계를 건너뛰겠다고 밝힌 경우(예: 탐색적 스파이크) 진행할 수 있지만, 다운스트림에서의 재작업 위험이 증가함을 경고해야 합니다.

실행 단계:

1. 리포지토리 루트에서 `.specify/scripts/powershell/check-prerequisites.ps1 -Json -PathsOnly`를 **한 번** 실행합니다. 최소한의 JSON 페이로드 필드를 파싱합니다:
   - `FEATURE_DIR`
   - `FEATURE_SPEC`
   - (선택적으로 향후 체인 흐름을 위해 `IMPL_PLAN`, `TASKS` 캡처)
   - JSON 파싱에 실패하면 중단하고 사용자에게 `/speckit.specify`를 다시 실행하거나 기능 브랜치 환경을 확인하도록 안내합니다.
   - 인수에 "I'm Groot"와 같은 작은따옴표가 포함된 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표: "I'm Groot").

2. 현재 명세 파일을 로드합니다. 다음 분류 체계를 사용하여 구조화된 모호성 및 커버리지 스캔을 수행합니다. 각 카테고리에 대해 상태(Clear / Partial / Missing)를 표시합니다. 우선순위 지정에 사용되는 내부 커버리지 맵을 생성합니다 (질문을 하지 않을 계획이 아니라면 원본 맵을 출력하지 마십시오).

   기능적 범위 및 동작 (Functional Scope & Behavior):
   - 핵심 사용자 목표 및 성공 기준
   - 명시적인 범위 외(out-of-scope) 선언
   - 사용자 역할 / 페르소나 차별화

   도메인 및 데이터 모델 (Domain & Data Model):
   - 엔티티, 속성, 관계
   - 식별 및 고유성 규칙
   - 수명 주기/상태 전환
   - 데이터 볼륨 / 규모 가정

   상호작용 및 UX 흐름 (Interaction & UX Flow):
   - 핵심 사용자 여정 / 시퀀스
   - 에러/빈 화면/로딩 상태
   - 접근성 또는 로컬라이제이션 메모

   비기능적 품질 속성 (Non-Functional Quality Attributes):
   - 성능 (지연 시간, 처리량 목표)
   - 확장성 (수평/수직, 제한)
   - 신뢰성 및 가용성 (업타임, 복구 기대치)
   - 관측 가능성 (로깅, 메트릭, 트레이싱 신호)
   - 보안 및 개인정보 (인증/인가, 데이터 보호, 위협 가정)
   - 준수 / 규제 제약 (있는 경우)

   통합 및 외부 의존성 (Integration & External Dependencies):
   - 외부 서비스/API 및 실패 모드
   - 데이터 가져오기/내보내기 형식
   - 프로토콜/버전 관리 가정

   예외 케이스 및 실패 처리 (Edge Cases & Failure Handling):
   - 부정적 시나리오
   - 속도 제한 (Rate limiting / throttling)
   - 충돌 해결 (예: 동시 편집)

   제약 사항 및 트레이드오프 (Constraints & Tradeoffs):
   - 기술적 제약 사항 (언어, 저장소, 호스팅)
   - 명시적 트레이드오프 또는 거부된 대안

   용어 및 일관성 (Terminology & Consistency):
   - 표준 용어집(Glossary) 용어
   - 지양해야 할 유의어 / 권장되지 않는 용어

   완료 신호 (Completion Signals):
   - 수락 기준의 테스트 가능성
   - 측정 가능한 완료 정의(Definition of Done) 스타일 지표

   기타 / 플레이스홀더:
   - TODO 마커 / 해결되지 않은 결정 사항
   - 정량화가 부족한 모호한 형용사 ("강력한", "직관적인")

   Partial 또는 Missing 상태인 각 카테고리에 대해 후보 질문 기회를 추가합니다. 단, 다음의 경우는 제외합니다:
   - 명확화가 구현이나 검증 전략을 실질적으로 바꾸지 않는 경우
   - 정보가 계획 단계(planning phase)로 미루는 것이 더 나은 경우 (내부적으로 메모)

3. 내부적으로 우선순위가 지정된 후보 명확화 질문 큐(최대 5개)를 생성합니다. 한꺼번에 모두 출력하지 마십시오. 다음 제약 사항을 적용합니다:
    - 전체 세션 동안 총 질문 수는 최대 5개입니다.
    - 각 질문은 다음 중 하나로 답변 가능해야 합니다:
       - 짧은 객관식 선택 (2-5개의 구별되고 상호 배타적인 옵션)
       - 단어 하나 또는 짧은 구절 답변 (명시적으로 제한: "5단어 이내로 답변하십시오").
    - 아키텍처, 데이터 모델링, 작업 분해, 테스트 설계, UX 동작, 운영 준비 상태 또는 컴플라이언스 검증에 실질적인 영향을 미치는 질문만 포함합니다.
    - 카테고리 커버리지 균형을 보장합니다: 영향도가 가장 큰 해결되지 않은 카테고리를 먼저 다루려고 시도하십시오. 영향도가 낮은 질문 두 개를 묻기보다 영향도가 큰 영역(예: 보안 태세) 하나를 해결하십시오.
    - 이미 답변된 질문, 사소한 스타일 선호도 또는 계획 수준의 실행 세부 사항(정확성을 차단하지 않는 한)은 제외합니다.
    - 다운스트림의 재작업 위험을 줄이거나 잘못된 수락 테스트를 방지하는 명확화를 선호합니다.
    - 5개 이상의 카테고리가 해결되지 않은 상태로 남은 경우, (영향도 * 불확실성) 휴리스틱에 따라 상위 5개를 선택합니다.

4. 순차적 질문 루프 (대화형):
    - 한 번에 **정확히 하나의 질문**만 제시합니다.
    - 객관식 질문의 경우:
       - **모든 옵션을 분석**하고 다음에 기반하여 **가장 적합한 옵션**을 결정합니다:
          - 프로젝트 유형에 대한 베스트 프랙티스
          - 유사한 구현에서의 일반적인 패턴
          - 위험 감소 (보안, 성능, 유지보수성)
          - 명세에 보이는 명시적인 프로젝트 목표나 제약 사항과의 정렬
       - 상단에 명확한 근거(이것이 왜 최선의 선택인지 설명하는 1-2문장)와 함께 **권장 옵션을 눈에 띄게** 제시합니다.
       - 형식: `**권장(Recommended):** 옵션 [X] - <이유>`
       - 그런 다음 모든 옵션을 마크다운 테이블로 렌더링합니다:

       | 옵션 | 설명 |
       |--------|-------------|
       | A | <옵션 A 설명> |
       | B | <옵션 B 설명> |
       | C | <옵션 C 설명> (필요에 따라 5개까지 D/E 추가) |
       | 기타 | 다른 짧은 답변 제공 (5단어 이내) (자유 형식 대안이 적절한 경우에만 포함) |

       - 테이블 뒤에 다음을 추가합니다: `옵션 문자(예: "A")로 답하거나, "yes" 또는 "권장"이라고 말하여 권장 사항을 수락하거나, 직접 짧은 답변을 제공할 수 있습니다.`
    - 단답형 스타일의 경우 (의미 있는 개별 옵션이 없는 경우):
       - 베스트 프랙티스와 문맥을 바탕으로 **제안 답변**을 제공합니다.
       - 형식: `**제안(Suggested):** <제안하는 답변> - <간략한 이유>`
       - 그런 다음 출력합니다: `형식: 짧은 답변 (5단어 이내). "yes" 또는 "제안"이라고 말하여 제안을 수락하거나 직접 답변을 제공할 수 있습니다.`
    - 사용자가 답변한 후:
       - 사용자가 "yes", "권장" 또는 "제안"이라고 답하면 이전에 언급한 권장/제안 사항을 답변으로 사용합니다.
       - 그렇지 않은 경우, 답변이 하나의 옵션에 매핑되거나 5단어 이내 제한에 맞는지 확인합니다.
       - 모호한 경우 빠른 확인을 요청합니다 (이 횟수는 동일한 질문에 속하며 새로 카운트하지 않습니다).
       - 만족스러우면 이를 작업 메모리에 기록하고(아직 디스크에 쓰지 않음) 다음 대기 중인 질문으로 이동합니다.
    - 다음의 경우 질문을 중단합니다:
       - 모든 핵심 모호성이 조기에 해결됨 (남은 질문이 불필요해짐)
       - 사용자가 완료 신호를 보냄 ("완료", "좋음", "그만")
       - 질문 수 5개에 도달함
    - 다음에 나올 질문을 미리 공개하지 마십시오.
    - 시작 시 유효한 질문이 존재하지 않으면 즉시 핵심 모호성이 없음을 보고합니다.

5. 각 수락된 답변 후 통합 (증분 업데이트 방식):
    - 명세의 인메모리 표현(시작 시 한 번 로드됨)과 원본 파일 내용을 유지합니다.
    - 이번 세션의 첫 번째 통합 답변의 경우:
       - `## 명확해진 내용 (Clarifications)` 섹션이 존재하는지 확인합니다 (없다면 명세 템플릿에 따라 최상위 컨텍스트/개요 섹션 바로 다음에 생성).
       - 그 아래에 오늘 날짜의 `### 세션 YYYY-MM-DD` 부제목을 생성합니다 (없다면 생성).
    - 수락 직후 불렛 라인을 추가합니다: `- Q: <질문> → A: <최종 답변>`.
    - 그런 다음 해당 내용을 가장 적절한 섹션에 즉시 적용합니다:
       - 기능적 모호성 → 기능적 요구사항(Functional Requirements)의 불렛 업데이트 또는 추가.
       - 사용자 상호작용 / 액터 구분 → 명확해진 역할, 제약 사항 또는 시나리오로 사용자 스토리 또는 액터 하위 섹션 업데이트.
       - 데이터 형태 / 엔티티 → 데이터 모델 업데이트 (필드, 유형, 관계 추가)하며 순서 유지. 추가된 제약 사항을 간결하게 기록.
       - 비기능적 제약 사항 → 성공 기준 > 측정 가능한 결과(Success Criteria > Measurable Outcomes)의 측정 가능한 기준 추가/수정 (모호한 형용사를 지표나 명시적 목표로 변환).
       - 예외 케이스 / 부정적 흐름 → 예외 케이스 / 에러 처리(Edge Cases / Error Handling) 아래에 새 불렛 추가 (또는 템플릿에 플레이스홀더가 있는 경우 해당 하위 섹션 생성).
       - 용어 충돌 → 명세 전체에서 용어 표준화. 필요한 경우에만 `(이전에는 "X"로 지칭됨)`을 한 번 추가하여 원래 용어 유지.
    - 명확해진 내용이 이전의 모호한 문장을 무효화하는 경우, 중복하지 말고 해당 문장을 교체하십시오. 모순되는 오래된 텍스트를 남기지 마십시오.
    - 컨텍스트 손실 위험을 최소화하기 위해 각 통합 후에 명세 파일을 저장합니다 (원자적 덮어쓰기).
    - 포맷 유지: 관련 없는 섹션의 순서를 바꾸지 마십시오. 헤더 계층 구조를 그대로 유지하십시오.
    - 삽입되는 각 명확화 내용은 최소한으로 유지하고 테스트 가능해야 합니다 (서사적 변질 방지).

6. 검증 (각 쓰기 후 및 최종 패스에서 수행):
   - 명확해진 내용 세션에 수락된 답변당 정확히 하나의 불렛이 포함되어 있음 (중복 없음).
   - 총 질문 수(수락됨) ≤ 5.
   - 업데이트된 섹션에 새 답변이 해결하기로 했던 모호한 플레이스홀더가 남아 있지 않음.
   - 모순되는 이전 문장이 남아 있지 않음 (제거된 무효한 대안 선택 사항 스캔).
   - 마크다운 구조가 유효함. 허용되는 새 헤더는 오직 `## 명확해진 내용 (Clarifications)`, `### 세션 YYYY-MM-DD`뿐임.
   - 용어 일관성: 업데이트된 모든 섹션에서 동일한 표준 용어가 사용됨.

7. 업데이트된 명세를 `FEATURE_SPEC`에 다시 씁니다.

8. 완료 보고 (질문 루프 종료 또는 조기 종료 후):
   - 질문 및 답변 수.
   - 업데이트된 명세 경로.
   - 수정된 섹션 목록.
   - 각 분류 카테고리에 대한 커버리지 요약 테이블 출력. 상태: Resolved (Partial/Missing이었으나 해결됨), Deferred (질문 쿼터를 초과했거나 계획 단계에 더 적합함), Clear (이미 충분함), Outstanding (여전히 Partial/Missing이지만 영향도가 낮음).
   - Outstanding 또는 Deferred가 남아 있는 경우, `/speckit.plan`으로 진행할지 아니면 나중에 계획 수립 후 다시 `/speckit.clarify`를 실행할지 권장합니다.
   - 제안된 다음 명령어.

동작 규칙:

- 의미 있는 모호성을 찾지 못한 경우 (또는 모든 잠재적 질문의 영향도가 낮은 경우) 다음과 같이 응답하십시오: "공식적인 명확화가 필요한 치명적인 모호성이 발견되지 않았습니다." 그리고 진행을 제안하십시오.
- 명세 파일이 누락된 경우, 사용자에게 `/speckit.specify`를 먼저 실행하도록 안내하십시오 (여기서 새 명세를 생성하지 마십시오).
- 총 질문 수는 절대로 5개를 초과하지 마십시오 (하나의 질문에 대한 명확화 재시도는 새 질문으로 카운트하지 않습니다).
- 기술 스택에 대한 추측성 질문은 그것이 기능적 명확성을 차단하지 않는 한 피하십시오.
- 사용자의 조기 종료 신호("중단", "완료", "진행")를 존중하십시오.
- 전체 커버리지로 인해 질문을 하지 않은 경우, 요약된 커버리지 테이블(모든 카테고리 Clear)을 출력한 후 진행을 제안하십시오.
- 해결되지 않은 고영향도 카테고리가 있는 상태로 쿼터에 도달한 경우, 근거와 함께 Deferred 아래에 명시적으로 플래그를 지정하십시오.

우선순위 지정을 위한 컨텍스트: {{args}}

## 사후 실행 체크 (Post-Execution Checks)

**확장 훅 확인 (명확화 후)**:
프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
- 존재한다면 이를 읽고 `hooks.after_clarify` 키 아래의 항목을 찾습니다.
- YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
- `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
- 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
  - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
  - 훅에 비어 있지 않은 `condition`이 정의된 경우, 훅을 건너뛰고 조건 평가를 HookExecutor 구현에 맡깁니다.
- 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
  - **선택적 훅** (`optional: true`):
    ```
    ## 확장 훅 (Extension Hooks)

    **선택적 훅**: {extension}
    명령어: `/{command}`
    설명: {description}

    프롬프트: {prompt}
    실행하려면: `/{command}`
    ```
  - **필수 훅** (`optional: false`):
    ```
    ## 확장 훅 (Extension Hooks)

    **자동 훅**: {extension}
    실행 중: `/{command}`
    EXECUTE_COMMAND: {command}
    ```
- 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 조용히 건너뜜"""
