description = "대화형 또는 제공된 원칙 입력을 통해 프로젝트 헌법을 생성하거나 업데이트하여 모든 종속된 템플릿이 동기화 상태를 유지하도록 합니다."

prompt = """

## 사용자 입력 (User Input)

```text
{{args}}
```

사용자 입력이 비어 있지 않은 경우, 진행하기 전에 이를 반드시 고려해야 합니다.

## 사전 실행 체크 (Pre-Execution Checks)

**확장 훅 확인 (헌법 업데이트 전)**:
- 프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
- 존재한다면 이를 읽고 `hooks.before_constitution` 키 아래의 항목을 찾습니다.
- YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
- `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
- 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
  - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
  - 훅에 비어 있지 않은 `condition`이 정의된 경우, 훅을 건너뛰고 조건 평가를 HookExecutor 구현에 맡깁니다.
- 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
  - **선택적 사전 훅** (`optional: true`):
    ```
    ## 확장 훅 (Extension Hooks)

    **선택적 사전 훅**: {extension}
    명령어: `/{command}`
    설명: {description}

    프롬프트: {prompt}
    실행하려면: `/{command}`
    ```
  - **필수 사전 훅** (`optional: false`):
    ```
    ## 확장 훅 (Extension Hooks)

    **자동 사전 훅**: {extension}
    실행 중: `/{command}`
    EXECUTE_COMMAND: {command}

    Outline으로 진행하기 전에 훅 명령어의 결과를 기다리십시오.
    ```
- 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 조용히 건너뜜

## 개요 (Outline)

귀하는 `.specify/memory/constitution.md`에서 프로젝트 헌법을 업데이트하고 있습니다. 이 파일은 대괄호 안에 플레이스홀더 토큰(예: `[PROJECT_NAME]`, `[원칙_1_이름]`)을 포함하는 템플릿입니다. 귀하의 임무는 (a) 구체적인 값을 수집/도출하고, (b) 템플릿을 정확하게 채우고, (c) 종속된 아티팩트 전반에 개정 사항을 전파하는 것입니다.

**참고**: `.specify/memory/constitution.md`가 아직 존재하지 않는 경우, 프로젝트 설정 중에 `.specify/templates/constitution-template.md`에서 초기화되어야 합니다. 누락된 경우 먼저 템플릿을 복사하십시오.

다음 실행 흐름을 따르십시오:

1. `.specify/memory/constitution.md`에 있는 기존 헌법을 로드합니다.
   - `[모든_대문자_식별자]` 형식의 모든 플레이스홀더 토큰을 식별합니다.
   **중요**: 사용자는 템플릿에 사용된 것보다 적거나 많은 원칙을 요구할 수 있습니다. 개수가 지정된 경우 이를 준수하여 일반 템플릿을 따르십시오. 이에 따라 문서를 업데이트할 것입니다.

2. 플레이스홀더에 대한 값을 수집/도출합니다:
   - 사용자 입력(대화)에서 값을 제공하면 이를 사용합니다.
   - 그렇지 않으면 기존 리포지토리 컨텍스트(README, 문서, 포함된 이전 헌법 버전)에서 유추합니다.
   - 거버넌스 날짜의 경우: `비준일(RATIFICATION_DATE)`은 원래 채택된 날짜입니다 (알 수 없는 경우 질문하거나 TODO로 표시). `최종 수정일(LAST_AMENDED_DATE)`은 변경 사항이 있으면 오늘 날짜로, 그렇지 않으면 이전 날짜를 유지합니다.
   - `헌법 버전(CONSTITUTION_VERSION)`은 시맨틱 버저닝 규칙에 따라 증가해야 합니다:
     - MAJOR: 하위 호환되지 않는 거버넌스/원칙 제거 또는 재정의.
     - MINOR: 새로운 원칙/섹션 추가 또는 실질적으로 확장된 지침.
     - PATCH: 명확화, 문구 수정, 오타 수정, 비시맨틱 정제.
   - 버전 업 유형이 모호한 경우 최종 확정 전에 근거를 제시하십시오.

3. 업데이트된 헌법 내용을 초안으로 작성합니다:
   - 모든 플레이스홀더를 구체적인 텍스트로 교체합니다 (프로젝트에서 아직 정의하지 않기로 선택한 의도적으로 남겨둔 템플릿 슬롯을 제외하고는 대괄호 토큰이 남지 않아야 함 - 남겨둔 경우 명시적으로 정당화하십시오).
   - 헤더 계층 구조를 유지하고, 교체된 후에도 명확한 지침을 추가하는 경우가 아니라면 주석은 제거할 수 있습니다.
   - 각 원칙(Principle) 섹션에는 간결한 이름 한 줄, 협상 불가능한 규칙을 담은 단락(또는 불렛 리스트), 명백하지 않은 경우 명시적인 근거가 포함되어야 합니다.
   - 거버넌스(Governance) 섹션에는 개정 절차, 버전 관리 정책 및 준수 검토 기대치가 나열되어야 합니다.

4. 일관성 전파 체크리스트 (이전 체크리스트를 활성 검증으로 변환):
   - `.specify/templates/plan-template.md`를 읽고 "헌법 준수 확인" 또는 규칙이 업데이트된 원칙과 일치하는지 확인합니다.
   - 범위/요구사항 정렬을 위해 `.specify/templates/spec-template.md`를 읽습니다 - 헌법이 필수 섹션이나 제약 사항을 추가/제거한 경우 업데이트합니다.
   - `.specify/templates/tasks-template.md`를 읽고 작업 카테고리에 새로운 또는 제거된 원칙 기반 작업 유형(예: 관측 가능성, 버전 관리, 테스트 규율)이 반영되어 있는지 확인합니다.
   - `.specify/templates/commands/*.md`에 있는 각 명령 파일을 읽어 범용 지침이 필요한 곳에 오래된 참조(에이전트 전용 이름 등)가 남아 있지 않은지 확인합니다.
   - 실행 중인 모든 가이드 문서(예: `README.md`, `docs/quickstart.md` 또는 에이전트 전용 가이드 파일)를 읽고 변경된 원칙에 대한 참조를 업데이트합니다.

5. 동기화 영향 보고서(Sync Impact Report) 생성 (업데이트 후 헌법 파일 상단에 HTML 주석으로 추가):
   - 버전 변경: 이전 → 이후
   - 수정된 원칙 목록 (이름이 바뀐 경우 이전 제목 → 새 제목)
   - 추가된 섹션
   - 제거된 섹션
   - 업데이트가 필요한 템플릿 (✅ 업데이트됨 / ⚠ 보류 중) 및 파일 경로
   - 의도적으로 미루어진 플레이스홀더가 있는 경우 후속 TODO.

6. 최종 출력 전 검증:
   - 설명되지 않은 대괄호 토큰이 남아 있지 않음.
   - 버전 라인이 보고서와 일치함.
   - 날짜는 ISO 형식 YYYY-MM-DD.
   - 원칙은 선언적이고 테스트 가능하며 모호한 언어가 없음 ("should" → 적절한 경우 MUST/SHOULD 근거로 교체).

7. 완료된 헌법을 `.specify/memory/constitution.md`에 다시 씁니다 (덮어쓰기).

8. 사용자에게 다음 내용이 포함된 최종 요약을 출력합니다:
   - 새 버전 및 버전 업 근거.
   - 수동 후속 작업이 필요한 것으로 플래그 지정된 파일들.
   - 권장 커밋 메시지 (예: `docs: vX.Y.Z로 헌법 개정 (원칙 추가 + 거버넌스 업데이트)`).

포맷팅 및 스타일 요구사항:

- 템플릿과 정확히 동일한 마크다운 헤더를 사용하십시오 (레벨을 낮추거나 높이지 마십시오).
- 가독성을 위해 긴 근거 문장은 줄바꿈하십시오 (가급적 100자 미만).
- 섹션 사이에 한 줄의 공백을 둡니다.
- 행 끝의 공백을 피하십시오.

사용자가 일부만 업데이트(예: 원칙 하나만 수정)하도록 요청하더라도 여전히 검증 및 버전 결정 단계를 수행하십시오.

핵심 정보가 누락된 경우(예: 비준일을 정말 알 수 없는 경우), `TODO(<필드_이름>): 설명`을 삽입하고 동기화 영향 보고서의 지연된 항목 아래에 포함하십시오.

새 템플릿을 만들지 마십시오. 항상 기존의 `.specify/memory/constitution.md` 파일에서 작업하십시오.

## 사후 실행 체크 (Post-Execution Checks)

**확장 훅 확인 (헌법 업데이트 후)**:
프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
- 존재한다면 이를 읽고 `hooks.after_constitution` 키 아래의 항목을 찾습니다.
- YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
- `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
- 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
  - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
  - 훅에 비어 있지 않은 `condition`이 정의된 경우, 훅을 건너뛰고 조건 평가를 HookExecutor 구현에 맡깁니다.
- 실행 가능한 각 훅에 대해 `optional" 플래그에 따라 다음을 출력합니다:
  - **선택적 훅** (`optional: true`):
    ```
    ## 확장 훅 (Extension Hooks)

    **선택적 훅**: {extension}
    명령어: `/{command}`
    설명: {description}

    프롬프트: {prompt}
    실행하려면: `/{command}`
    ```
  - **필수 훅** (`optional: false`):
    ```
    ## 확장 훅 (Extension Hooks)

    **자동 훅**: {extension}
    실행 중: `/{command}`
    EXECUTE_COMMAND: {command}
    ```
- 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 조용히 건너뜜"""
