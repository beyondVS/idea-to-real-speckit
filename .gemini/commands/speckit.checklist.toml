- 올바름: 요구사항 품질의 타당성 확인 (Validation)
- 틀림: "그것이 X를 수행하는가?"
- 올바름: "X가 명확하게 명시되어 있는가?"

## 사후 실행 체크 (Post-Execution Checks)

**확장 훅 확인 (체크리스트 생성 후)**:
프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
- 존재한다면 이를 읽고 `hooks.after_checklist` 키 아래의 항목을 찾습니다.
- YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
- `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
- 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
  - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
  - 훅에 비어 있지 않은 `condition`이 정의된 경우, 훅을 건너뛰고 조건 평가를 HookExecutor 구현에 맡깁니다.
- 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
  - **선택적 훅** (`optional: true`):
    ```
    ## 확장 훅 (Extension Hooks)

    **선택적 훅**: {extension}
    명령어: `/{command}`
    설명: {description}

    프롬프트: {prompt}
    실행하려면: `/{command}`
    ```
  - **필수 훅** (`optional: false`):
    ```
    ## 확장 훅 (Extension Hooks)

    **자동 훅**: {extension}
    실행 중: `/{command}`
    EXECUTE_COMMAND: {command}
    ```
- 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 조용히 건너뜜"""
