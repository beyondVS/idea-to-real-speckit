description = "사용자 요구사항을 바탕으로 현재 기능에 대한 맞춤형 체크리스트를 생성합니다."

prompt = """

## 체크리스트 목적: "영어로 작성된 요구사항의 단위 테스트" (Unit Tests for English)

**중요 개념**: 체크리스트는 **요구사항 작성에 대한 단위 테스트**입니다. 이는 주어진 도메인에서 요구사항의 품질, 명확성 및 완전성을 검증합니다.

**검증/테스트용이 아님**:

- ❌ "버튼이 올바르게 클릭되는지 확인" (구현 테스트 아님)
- ❌ "에러 처리가 작동하는지 테스트"
- ❌ "API가 200을 반환하는지 확인"
- ❌ 코드/구현이 명세와 일치하는지 확인하는 것이 아님

**요구사항 품질 검증용**:

- ✅ "모든 카드 유형에 대해 시각적 계층 구조 요구사항이 정의되어 있는가?" (완전성)
- ✅ "'눈에 띄는 표시'가 구체적인 크기/위치로 정량화되어 있는가?" (명확성)
- ✅ "모든 상호작용 요소에서 호버 상태 요구사항이 일관되게 정의되어 있는가?" (일관성)
- ✅ "키보드 탐색에 대한 접근성 요구사항이 정의되어 있는가?" (커버리지)
- ✅ "로고 이미지 로드 실패 시 어떤 일이 발생하는지 명세에 정의되어 있는가?" (예외 케이스)

**비유**: 명세가 영어로 작성된 코드라면, 체크리스트는 그 코드의 단위 테스트 제품군입니다. 구현이 작동하는지가 아니라 요구사항이 잘 작성되었고, 완전하며, 모호하지 않고, 구현할 준비가 되었는지 테스트하는 것입니다.

## 사용자 입력 (User Input)

```text
{{args}}
```

사용자 입력이 비어 있지 않은 경우, 진행하기 전에 이를 반드시 고려해야 합니다.

## 사전 실행 체크 (Pre-Execution Checks)

**확장 훅 확인 (체크리스트 생성 전)**:
- 프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
- 존재한다면 이를 읽고 `hooks.before_checklist` 키 아래의 항목을 찾습니다.
- YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
- `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
- 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
  - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
  - 훅에 비어 있지 않은 `condition`이 정의된 경우, 훅을 건너뛰고 조건 평가를 HookExecutor 구현에 맡깁니다.
- 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
  - **선택적 사전 훅** (`optional: true`):
    ```
    ## 확장 훅 (Extension Hooks)

    **선택적 사전 훅**: {extension}
    명령어: `/{command}`
    설명: {description}

    프롬프트: {prompt}
    실행하려면: `/{command}`
    ```
  - **필수 사전 훅** (`optional: false`):
    ```
    ## 확장 훅 (Extension Hooks)

    **자동 사전 훅**: {extension}
    실행 중: `/{command}`
    EXECUTE_COMMAND: {command}

    Execution Steps로 진행하기 전에 훅 명령어의 결과를 기다리십시오.
    ```
- 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 조용히 건너뜜

## 실행 단계 (Execution Steps)

1. **설정**: 리포지토리 루트에서 `.specify/scripts/powershell/check-prerequisites.ps1 -Json`을 실행하고 FEATURE_DIR 및 AVAILABLE_DOCS 목록에 대한 JSON을 파싱합니다.
   - 모든 파일 경로는 절대 경로여야 합니다.
   - 인수에 "I'm Groot"와 같은 작은따옴표가 포함된 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표: "I'm Groot").

2. **의도 명확화 (동적)**: 최대 3개의 초기 문맥 명확화 질문을 도출합니다 (미리 정의된 목록 없음). 질문은 반드시 다음을 따라야 합니다:
   - 사용자의 문구 + 명세/계획/작업에서 추출된 신호를 기반으로 생성됩니다.
   - 체크리스트 내용에 실질적인 변화를 주는 정보만 질문합니다.
   - `{{args}}`에서 이미 명확한 경우 개별 질문을 건너뜁니다.
   - 범위보다는 정밀도를 우선시합니다.

   생성 알고리즘:
   1. 신호 추출: 기능 도메인 키워드(예: 인증, 지연 시간, UX, API), 위험 지표("치명적", "필수", "준수"), 이해관계자 힌트("QA", "검토", "보안 팀"), 명시적 결과물("a11y", "롤백", "계약").
   2. 관련성에 따라 순위가 매겨진 후보 중점 분야(최대 4개)로 신호를 그룹화합니다.
   3. 명시되지 않은 경우 예상 독자 및 시기(작성자, 검토자, QA, 출시)를 식별합니다.
   4. 누락된 차원 탐지: 범위의 너비, 깊이/엄격함, 위험 강조, 제외 경계, 측정 가능한 수락 기준.
   5. 다음 원형 중에서 질문을 작성합니다:
      - 범위 정제 (예: "여기에 X 및 Y와의 통합 접점이 포함되어야 합니까, 아니면 로컬 모듈의 정확성으로 제한되어야 합니까?")
      - 위험 우선순위 지정 (예: "이러한 잠재적 위험 영역 중 어떤 것이 필수 게이트 체크를 받아야 합니까?")
      - 깊이 보정 (예: "이것이 가벼운 프리커밋 무결성 확인 목록입니까, 아니면 정식 출시 게이트입니까?")
      - 독자 설정 (예: "이것이 작성자 본인에 의해 사용됩니까, 아니면 PR 검토 중 동료들에 의해 사용됩니까?")
      - 경계 제외 (예: "이번 라운드에서 성능 튜닝 항목을 명시적으로 제외해야 합니까?")
      - 시나리오 클래스 공백 (예: "복구 흐름이 감지되지 않았습니다. 롤백/부분 실패 경로가 범위에 포함됩니까?")

   질문 포맷팅 규칙:
   - 옵션을 제시하는 경우 '옵션 | 후보 | 중요한 이유' 열이 포함된 압축된 테이블을 생성합니다.
   - 옵션은 최대 A~E개로 제한하며, 자유 형식 답변이 더 명확한 경우 테이블을 생략합니다.
   - 사용자에게 이미 말한 내용을 다시 말하게 하지 마십시오.
   - 추측성 카테고리를 피하십시오(허구 금지). 불확실한 경우 "X가 범위에 속하는지 확인해 주십시오"라고 명시적으로 묻습니다.

   상호작용이 불가능할 때의 기본값:
   - 깊이: 표준
   - 독자: 코드 관련인 경우 검토자(PR), 그 외에는 작성자
   - 중점: 상위 2개 관련성 그룹

   질문을 출력합니다 (Q1/Q2/Q3 레이블 사용). 답변 후 2개 이상의 시나리오 클래스(대체 / 예외 / 복구 / 비기능 도메인)가 여전히 불분명한 경우, 각각 한 줄의 정당화 사유(예: "해결되지 않은 복구 경로 위험")와 함께 최대 2개의 추가 타겟 질문(Q4/Q5)을 던질 수 있습니다. 총 5개 질문을 초과하지 마십시오. 사용자가 더 이상의 질문을 거부하면 에스컬레이션을 건너뜁니다.

3. **사용자 요청 이해**: `{{args}}` + 명확화 답변을 결합합니다:
   - 체크리스트 테마(예: 보안, 검토, 배포, UX)를 도출합니다.
   - 사용자가 언급한 명시적 필수 항목을 통합합니다.
   - 선택된 중점 분야를 카테고리 구조에 매핑합니다.
   - 명세/계획/작업에서 누락된 문맥을 추론합니다 (허구 금지).

4. **기능 컨텍스트 로드**: FEATURE_DIR에서 다음을 읽습니다:
   - `spec.md`: 기능 요구사항 및 범위
   - `plan.md` (존재하는 경우): 기술적 세부 사항, 의존성
   - `tasks.md` (존재하는 경우): 구현 작업

   **컨텍스트 로드 전략**:
   - 활성 중점 분야와 관련된 필요한 부분만 로드합니다 (파일 전체 덤프 방지).
   - 긴 섹션을 간결한 시나리오/요구사항 불렛 포인트로 요약하는 것을 선호합니다.
   - 점진적 노출 사용: 공백이 감지된 경우에만 후속 검색을 추가합니다.
   - 소스 문서가 큰 경우 원본 텍스트를 포함하는 대신 중간 요약 항목을 생성합니다.

5. **체크리스트 생성** - "요구사항에 대한 단위 테스트" 생성:
   - `FEATURE_DIR/checklists/` 디렉토리가 없으면 생성합니다.
   - 고유한 체크리스트 파일명을 생성합니다:
     - 도메인에 기반한 짧고 설명적인 이름을 사용합니다 (예: `ux.md`, `api.md`, `security.md`).
     - 형식: `[domain].md`
   - 파일 처리 동작:
     - 파일이 존재하지 않는 경우: 새 파일을 만들고 CHK001부터 번호 매기기를 시작합니다.
     - 파일이 존재하는 경우: 기존 파일에 새 항목을 추가하며, 마지막 CHK ID 다음부터 번호를 이어갑니다 (예: 마지막 항목이 CHK015라면 CHK016부터 시작).
   - 기존 체크리스트 내용을 삭제하거나 교체하지 마십시오 - 항상 보존하고 추가하십시오.

   **핵심 원칙 - 구현이 아니라 요구사항을 테스트하십시오**:
   모든 체크리스트 항목은 반드시 다음 측면에서 **요구사항 그 자체**를 평가해야 합니다:
   - **완전성 (Completeness)**: 필요한 모든 요구사항이 존재하는가?
   - **명확성 (Clarity)**: 요구사항이 모호하지 않고 구체적인가?
   - **일관성 (Consistency)**: 요구사항들이 서로 일치하는가?
   - **측정 가능성 (Measurability)**: 요구사항을 객관적으로 검증할 수 있는가?
   - **커버리지 (Coverage)**: 모든 시나리오/예외 케이스가 다루어지는가?

   **카테고리 구조** - 요구사항 품질 차원별로 항목을 그룹화합니다:
   - **요구사항 완전성** (필요한 모든 요구사항이 문서화되었는가?)
   - **요구사항 명확성** (요구사항이 구체적이고 모호하지 않은가?)
   - **요구사항 일관성** (요구사항들이 충돌 없이 일치하는가?)
   - **수락 기준 품질** (성공 기준이 측정 가능한가?)
   - **시나리오 커버리지** (모든 흐름/케이스가 다루어지는가?)
   - **예외 케이스 커버리지** (경계 조건이 정의되어 있는가?)
   - **비기능적 요구사항** (성능, 보안, 접근성 등이 명시되어 있는가?)
   - **의존성 및 가정 사항** (문서화되고 검증되었는가?)
   - **모호성 및 충돌** (어떤 부분에 명확화가 필요한가?)

   **체크리스트 항목 작성법 - "영어로 작성된 단위 테스트"**:

   ❌ **틀림** (구현 테스트):
   - "랜딩 페이지에 에피소드 카드 3개가 표시되는지 확인"
   - "데스크톱에서 호버 상태가 작동하는지 테스트"
   - "로고 클릭 시 홈으로 이동하는지 확인"

   ✅ **올바름** (요구사항 품질 테스트):
   - "추천 에피소드의 정확한 개수와 레이아웃이 명시되어 있는가?" [완전성]
   - "'눈에 띄는 표시'가 구체적인 크기/위치로 정량화되어 있는가?" [명확성]
   - "모든 상호작용 요소에서 호버 상태 요구사항이 일관되게 정의되어 있는가?" [일관성]
   - "모든 상호작용 UI에 대해 키보드 탐색 요구사항이 정의되어 있는가?" [커버리지]
   - "로고 이미지 로드 실패 시의 대체 동작이 명시되어 있는가?" [예외 케이스]
   - "비동기 에피소드 데이터에 대한 로딩 상태가 정의되어 있는가?" [완전성]
   - "명세가 상충하는 UI 요소들에 대한 시각적 계층 구조를 정의하고 있는가?" [명확성]

   **항목 구조**:
   각 항목은 다음 패턴을 따라야 합니다:
   - 요구사항 품질에 대해 묻는 질문 형식
   - 명세/계획에 **작성된 내용** (또는 작성되지 않은 내용)에 집중
   - 대괄호 안에 품질 차원 포함 [완전성/명확성/일관성 등]
   - 기존 요구사항을 확인하는 경우 명세 섹션 참조 `[Spec §X.Y]`
   - 누락된 요구사항을 확인하는 경우 `[Gap]` 마커 사용

   **품질 차원별 예시**:

   완전성:
   - "모든 API 실패 모드에 대해 에러 처리 요구사항이 정의되어 있는가? [Gap]"
   - "모든 상호작용 요소에 대해 접근성 요구사항이 명시되어 있는가? [완전성]"
   - "반응형 레이아웃에 대해 모바일 브레이크포인트 요구사항이 정의되어 있는가? [Gap]"

   명확성:
   - "'빠른 로딩'이 구체적인 시간 임계값으로 정량화되어 있는가? [명확성, Spec §NFR-2]"
   - "'관련 에피소드' 선택 기준이 명시적으로 정의되어 있는가? [명확성, Spec §FR-5]"
   - "'눈에 띄는'이 측정 가능한 시각적 속성으로 정의되어 있는가? [모호성, Spec §FR-4]"

   일관성:
   - "모든 페이지에서 탐색 요구사항이 일치하는가? [일관성, Spec §FR-10]"
   - "랜딩 페이지와 상세 페이지 간에 카드 컴포넌트 요구사항이 일관되는가? [일관성]"

   커버리지:
   - "데이터가 없는 시나리오(에피소드 없음)에 대한 요구사항이 정의되어 있는가? [커버리지, 예외 케이스]"
   - "동시 사용자 상호작용 시나리오가 다루어지는가? [커버리지, Gap]"
   - "부분적 데이터 로드 실패에 대한 요구사항이 명시되어 있는가? [커버리지, 예외 흐름]"

   측정 가능성:
   - "시각적 계층 구조 요구사항이 측정/테스트 가능한가? [수락 기준, Spec §FR-1]"
   - "'균형 잡힌 시각적 무게감'을 객관적으로 검증할 수 있는가? [측정 가능성, Spec §FR-2]"

   **시나리오 분류 및 커버리지** (요구사항 품질 중심):
   - 기본, 대체, 예외/에러, 복구, 비기능 시나리오에 대한 요구사항이 존재하는지 확인합니다.
   - 각 시나리오 클래스에 대해 질문합니다: "[시나리오 유형] 요구사항이 완전하고, 명확하며, 일관되는가?"
   - 시나리오 클래스가 누락된 경우: "[시나리오 유형] 요구사항이 의도적으로 제외되었는가 아니면 누락되었는가? [Gap]"
   - 상태 변경이 발생하는 경우 복원력/롤백을 포함합니다: "마이그레이션 실패에 대한 롤백 요구사항이 정의되어 있는가? [Gap]"

   **추적성 요구사항**:
   - 최소 80% 이상의 항목에 하나 이상의 추적성 참조가 포함되어야 합니다.
   - 각 항목은 명세 섹션 `[Spec §X.Y]`을 참조하거나 `[Gap]`, `[모호성]`, `[충돌]`, `[가정]` 마커를 사용해야 합니다.
   - ID 시스템이 없는 경우: "요구사항 및 수락 기준 ID 체계가 수립되어 있는가? [추적성]"

   **문제 표면화 및 해결** (요구사항 품질 문제):
   요구사항 자체에 대해 질문합니다:
   - 모호성: "'빠른'이라는 용어가 구체적인 지표로 정량화되어 있는가? [모호성, Spec §NFR-1]"
   - 충돌: "§FR-10과 §FR-10a 간에 탐색 요구사항이 충돌하는가? [충돌]"
   - 가정: "'항상 사용 가능한 팟캐스트 API'라는 가정이 검증되었는가? [가정]"
   - 의존성: "외부 팟캐스트 API 요구사항이 문서화되어 있는가? [의존성, Gap]"
   - 정의 누락: "'시각적 계층 구조'가 측정 가능한 기준으로 정의되어 있는가? [Gap]"

   **내용 통합**:
   - 소프트 캡: 후보 항목이 40개를 초과하는 경우 위험/영향도에 따라 우선순위를 정합니다.
   - 동일한 요구사항 측면을 확인하는 유사 항목은 병합합니다.
   - 영향도가 낮은 예외 케이스가 5개 이상인 경우 하나의 항목으로 만듭니다: "예외 케이스 X, Y, Z가 요구사항에서 다루어지는가? [커버리지]"

   **🚫 절대 금지** - 이 항목들은 요구사항 테스트가 아닌 구현 테스트로 만듭니다:
   - ❌ "확인", "테스트", "검증" + 구현 동작으로 시작하는 모든 항목
   - ❌ 코드 실행, 사용자 작업, 시스템 동작에 대한 참조
   - ❌ "올바르게 표시됨", "제대로 작동함", "예상대로 기능함"
   - ❌ "클릭", "이동", "렌더링", "로드", "실행"
   - ❌ 테스트 케이스, 테스트 계획, QA 절차
   - ❌ 구현 세부 사항 (프레임워크, API, 알고리즘)

   **✅ 필수 패턴** - 이 항목들은 요구사항 품질을 테스트합니다:
   - ✅ "[시나리오]에 대해 [요구사항 유형]이 정의/명시/문서화되어 있는가?"
   - ✅ "[모호한 용어]가 구체적인 기준으로 정량화/명확화되어 있는가?"
   - ✅ "[섹션 A]와 [섹션 B] 간에 요구사항이 일관되는가?"
   - ✅ "[요구사항]을 객관적으로 측정/검증할 수 있는가?"
   - ✅ "[예외 케이스/시나리오]가 요구사항에서 다루어지는가?"
   - ✅ "명세가 [누락된 측면]을 정의하고 있는가?"

6. **구조 참조**: 타이틀, 메타 섹션, 카테고리 헤더 및 ID 형식을 위해 `.specify/templates/checklist-template.md`의 표준 템플릿에 따라 체크리스트를 생성합니다. 템플릿을 사용할 수 없는 경우: H1 타이틀, 목적/생성 메타 라인, CHK001부터 전역적으로 증가하는 ID를 가진 `- [ ] CHK### <요구사항 항목>` 라인이 포함된 `##` 카테고리 섹션을 사용합니다.

7. **보고**: 체크리스트 파일의 전체 경로, 항목 수를 출력하고 실행이 새 파일을 생성했는지 또는 기존 파일에 추가했는지 요약합니다. 다음 내용을 요약 보고합니다:
   - 선택된 중점 분야
   - 깊이 수준
   - 주체/시기
   - 포함된 사용자의 명시적 필수 항목

**중요**: 각 `/speckit.checklist` 명령 호출은 짧고 설명적인 체크리스트 파일명을 사용하며, 새 파일을 생성하거나 기존 파일에 추가합니다. 이를 통해 다음이 가능합니다:

- 서로 다른 유형의 여러 체크리스트 (예: `ux.md`, `test.md`, `security.md`)
- 체크리스트 목적을 나타내는 간단하고 기억하기 쉬운 파일명
- `checklists/` 폴더에서 쉬운 식별 및 탐색

복잡함을 피하기 위해 설명적인 유형을 사용하고 완료된 불필요한 체크리스트는 정리하십시오.

