## 개요 (Outline)

1. **설정**: 리포지토리 루트에서 `.specify/scripts/powershell/setup-plan.ps1 -Json`을 실행하고 FEATURE_SPEC, IMPL_PLAN, SPECS_DIR, BRANCH에 대한 JSON을 파싱합니다. 인수에 "I'm Groot"와 같은 작은따옴표가 포함된 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표: "I'm Groot").

2. **컨텍스트 로드**: FEATURE_SPEC 및 `.specify/memory/constitution.md`를 읽습니다. 이미 복사된 IMPL_PLAN 템플릿을 로드합니다.

3. **계획 워크플로우 실행**: IMPL_PLAN 템플릿의 구조를 따라 다음을 수행합니다:
   - 기술적 문맥(Technical Context)을 채웁니다 (알 수 없는 사항은 "확인 필요(NEEDS CLARIFICATION)"로 표시).
   - 헌법(Constitution) 파일에서 헌법 준수 확인(Constitution Check) 섹션을 채웁니다.
   - 게이트(Gate)를 평가합니다 (정당화되지 않은 위반 사항이 있는 경우 ERROR).
   - Phase 0: `research.md` 생성 (모든 "확인 필요" 항목 해결).
   - Phase 1: `data-model.md`, `contracts/`, `quickstart.md` 생성.
   - Phase 1: 에이전트 스크립트를 실행하여 에이전트 컨텍스트를 업데이트합니다.
   - 설계 후 헌법 준수 확인(Constitution Check)을 재평가합니다.

4. **중단 및 보고**: Phase 2 계획 후에 명령어가 종료됩니다. 브랜치, IMPL_PLAN 경로 및 생성된 아티팩트를 보고합니다.

5. **확장 훅 확인**: 보고 후 프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
   - 존재한다면 이를 읽고 `hooks.after_plan` 키 아래의 항목을 찾습니다.
   - YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
   - `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
   - 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
     - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
     - 훅에 비어 있지 않은 `condition`이 정의된 경우, 훅을 건너뛰고 조건 평가를 HookExecutor 구현에 맡깁니다.
   - 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
     - **선택적 훅** (`optional: true`):
       ```
       ## 확장 훅 (Extension Hooks)

       **선택적 훅**: {extension}
       명령어: `/{command}`
       설명: {description}

       프롬프트: {prompt}
       실행하려면: `/{command}`
       ```
     - **필수 훅** (`optional: false`):
       ```
       ## 확장 훅 (Extension Hooks)

       **자동 훅**: {extension}
       실행 중: `/{command}`
       EXECUTE_COMMAND: {command}
       ```
   - 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 조용히 건너뜜

## 단계 (Phases)

### Phase 0: 개요 및 연구 (Outline & Research)

1. 위의 **기술적 문맥 (Technical Context)**에서 알 수 없는 사항을 추출합니다:
   - 각 "확인 필요(NEEDS CLARIFICATION)"에 대해 → 연구 작업 생성
   - 각 의존성에 대해 → 베스트 프랙티스 작업 생성
   - 각 통합에 대해 → 패턴 작업 생성

2. 연구 에이전트 생성 및 파견:

   ```text
   기술적 문맥의 각 알 수 없는 사항에 대해:
     작업: "{feature context}에 대한 {unknown} 연구"
   각 기술 선택에 대해:
     작업: "{domain}에서의 {tech} 베스트 프랙티스 찾기"
   ```

3. 다음 형식을 사용하여 발견된 내용을 `research.md`에 통합합니다:
   - 결정(Decision): [선택된 내용]
   - 근거(Rationale): [선택된 이유]
   - 고려된 대안(Alternatives considered): [기타 평가된 내용]

**출력**: 모든 "확인 필요" 항목이 해결된 `research.md`

### Phase 1: 설계 및 계약 (Design & Contracts)

**선행 조건:** `research.md` 완료

1. 기능 명세에서 엔티티 추출 → `data-model.md`:
   - 엔티티 이름, 필드, 관계
   - 요구사항의 유효성 검사 규칙
   - 해당되는 경우 상태 전환

2. 인터페이스 계약 정의 (프로젝트에 외부 인터페이스가 있는 경우) → `/contracts/`:
   - 프로젝트가 사용자나 다른 시스템에 노출하는 인터페이스 식별
   - 프로젝트 유형에 적합한 계약 형식 문서화
   - 예시: 라이브러리를 위한 공개 API, CLI 도구를 위한 명령 스키마, 웹 서비스를 위한 엔드포인트, 파서를 위한 문법, 애플리케이션을 위한 UI 계약
   - 프로젝트가 순수하게 내부용(빌드 스크립트, 일회성 도구 등)인 경우 건너뜁니다.

3. 에이전트 컨텍스트 업데이트:
   - `GEMINI.md`의 `<!-- SPECKIT START -->`와 `<!-- SPECKIT END -->` 마커 사이의 계획 참조를 1단계에서 생성된 계획 파일(IMPL_PLAN 경로)을 가리키도록 업데이트합니다.

**출력**: data-model.md, /contracts/*, quickstart.md, 업데이트된 에이전트 컨텍스트 파일

## 주요 규칙 (Key rules)

- 파일 시스템 작업에는 절대 경로를 사용하십시오. 문서 및 에이전트 컨텍스트 파일의 참조에는 프로젝트 상대 경로를 사용하십시오.
- 게이트 실패 또는 해결되지 않은 확인 사항이 있는 경우 ERROR 처리하십시오.
