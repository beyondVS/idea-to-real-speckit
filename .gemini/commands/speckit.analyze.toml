## 목표 (Goal)

구현 전에 세 가지 핵심 아티팩트(`spec.md`, `plan.md`, `tasks.md`) 전반에 걸쳐 불일치, 중복, 모호성 및 미흡한 항목을 식별합니다. 이 명령어는 `/speckit.tasks`가 완전한 `tasks.md`를 성공적으로 생성한 후에만 실행해야 합니다.

## 운영 제약 사항 (Operating Constraints)

**엄격한 읽기 전용**: 어떠한 파일도 수정하지 마십시오. 구조화된 분석 보고서를 출력하십시오. 선택적인 해결 계획을 제안하십시오(사용자가 명시적으로 승인해야만 수동으로 후속 편집 명령어를 호출할 수 있습니다).

**헌법의 권위 (Constitution Authority)**: 프로젝트 헌법(`.specify/memory/constitution.md`)은 이 분석 범위 내에서 **협상 불가**입니다. 헌법 충돌은 자동으로 치명적(CRITICAL)으로 간주되며, 원칙을 희석하거나 재해석하거나 무시하는 것이 아니라 명세(spec), 계획(plan) 또는 작업(tasks)을 조정해야 합니다. 원칙 자체를 변경해야 하는 경우, `/speckit.analyze` 외부에서 별도의 명시적인 헌법 업데이트를 통해 이루어져야 합니다.

## 실행 단계 (Execution Steps)

### 1. 분석 컨텍스트 초기화

리포지토리 루트에서 `.specify/scripts/powershell/check-prerequisites.ps1 -Json -RequireTasks -IncludeTasks`를 한 번 실행하고 FEATURE_DIR 및 AVAILABLE_DOCS에 대한 JSON을 파싱합니다. 절대 경로를 도출합니다:

- SPEC = FEATURE_DIR/spec.md
- PLAN = FEATURE_DIR/plan.md
- TASKS = FEATURE_DIR/tasks.md

필요한 파일이 누락된 경우 에러 메시지와 함께 중단하십시오 (사용자에게 누락된 선행 명령어를 실행하도록 안내).
인수에 "I'm Groot"와 같은 작은따옴표가 포함된 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표: "I'm Groot").

### 2. 아티팩트 로드 (점진적 노출)

각 아티팩트에서 최소한의 필수 컨텍스트만 로드합니다:

**spec.md에서:**

- 개요/문맥 (Overview/Context)
- 기능적 요구사항 (Functional Requirements)
- 성공 기준 (Success Criteria - 측정 가능한 결과, 예: 성능, 보안, 가용성, 사용자 성공, 비즈니스 영향)
- 사용자 스토리 (User Stories)
- 예외 케이스 (Edge Cases - 존재하는 경우)

**plan.md에서:**

- 아키텍처/스택 선택
- 데이터 모델 참조
- 단계 (Phases)
- 기술적 제약 사항

**tasks.md에서:**

- 작업 ID
- 설명
- 단계 그룹화
- 병렬 마커 [P]
- 참조된 파일 경로

**constitution에서:**

- 원칙 검증을 위해 `.specify/memory/constitution.md` 로드

### 3. 시맨틱 모델 구축 (Build Semantic Models)

내부 표현을 생성합니다 (출력에 원본 아티팩트를 포함하지 마십시오):

- **요구사항 인벤토리**: 각 기능적 요구사항(FR-###) 및 성공 기준(SC-###)에 대해 안정적인 키를 기록합니다. 명시적인 FR-/SC- 식별자가 있는 경우 이를 주 키로 사용하고, 가독성을 위해 명령형 구문 슬러그(예: "사용자가 파일을 업로드할 수 있음" → `user-can-upload-file`)를 선택적으로 도출합니다. 구축 가능한 작업이 필요한 성공 기준 항목(예: 부하 테스트 인프라, 보안 감사 도구)만 포함하고, 출시 후 결과 지표 및 비즈니스 KPI(예: "지원 티켓 50% 감소")는 제외합니다.
- **사용자 스토리/액션 인벤토리**: 수락 기준이 포함된 개별 사용자 액션
- **작업 커버리지 매핑**: 각 작업을 하나 이상의 요구사항 또는 스토리로 매핑합니다 (키워드 또는 ID나 핵심 구문과 같은 명시적 참조 패턴에 의해 추론)
- **헌법 규칙 세트**: 원칙 이름과 반드시 지켜야 할(MUST)/권장되는(SHOULD) 규범적 진술 추출

### 4. 탐지 패스 (토큰 효율적 분석)

신호가 높은 결과에 집중합니다. 총 50개 항목으로 제한하고, 나머지는 요약에 합산합니다.

#### A. 중복 탐지 (Duplication Detection)

- 거의 중복되는 요구사항 식별
- 통합을 위해 품질이 낮은 문구 표시

#### B. 모호성 탐지 (Ambiguity Detection)

- 측정 가능한 기준이 부족한 모호한 형용사(빠른, 확장 가능한, 보안이 철저한, 직관적인, 강력한) 플래그 지정
- 해결되지 않은 플레이스홀더(TODO, TKTK, ???, `<placeholder>` 등) 플래그 지정

#### C. 미흡한 명세 (Underspecification)

- 동사는 있지만 대상이나 측정 가능한 결과가 없는 요구사항
- 수락 기준 정렬이 누락된 사용자 스토리
- 명세나 계획에 정의되지 않은 파일이나 컴포넌트를 참조하는 작업

#### D. 헌법 정렬 (Constitution Alignment)

- MUST 원칙과 충돌하는 요구사항 또는 계획 요소
- 헌법에서 규정한 필수 섹션 또는 품질 게이트 누락

#### E. 커버리지 공백 (Coverage Gaps)

- 관련 작업이 하나도 없는 요구사항
- 매핑된 요구사항/스토리가 없는 작업
- 구축 가능한 작업이 필요하지만(성능, 보안, 가용성) 작업에 반영되지 않은 성공 기준

#### F. 불일치 (Inconsistency)

- 용어 드리프트 (동일한 개념이 파일마다 다르게 명명됨)
- 계획에는 참조되었지만 명세에는 없는 데이터 엔티티 (또는 그 반대)
- 작업 순서 모순 (예: 의존성 정보 없이 기초 설정 작업보다 먼저 진행되는 통합 작업)
- 충돌하는 요구사항 (예: 하나는 Next.js를 요구하고 다른 하나는 Vue를 명시함)

### 5. 심각도 할당 (Severity Assignment)

다음 휴리스틱을 사용하여 발견 사항의 우선순위를 정합니다:

- **치명적 (CRITICAL)**: 헌법의 MUST 원칙 위반, 핵심 명세 아티팩트 누락, 또는 기본 기능을 차단하는 커버리지 제로 요구사항
- **높음 (HIGH)**: 중복되거나 충돌하는 요구사항, 모호한 보안/성능 속성, 테스트 불가능한 수락 기준
- **중간 (MEDIUM)**: 용어 드리프트, 비기능적 작업 커버리지 누락, 미흡하게 명세된 예외 케이스
- **낮음 (LOW)**: 스타일/문구 개선, 실행 순서에 영향을 미치지 않는 사소한 중복

### 6. 요약 분석 보고서 생성

다음 구조로 마크다운 보고서(파일 쓰기 없음)를 출력합니다:

## 명세 분석 보고서 (Specification Analysis Report)

| ID | 카테고리 | 심각도 | 위치 | 요약 | 권장 사항 |
|----|----------|----------|-------------|---------|----------------|
| A1 | 중복 | 높음 | spec.md:L120-134 | 두 개의 유사한 요구사항 ... | 문구 통합; 더 명확한 버전 유지 |

(발견 사항당 한 행씩 추가, 카테고리 이니셜이 붙은 안정적인 ID 생성)

**커버리지 요약 테이블:**

| 요구사항 키 | 작업 있음? | 작업 ID | 참고 |
|-----------------|-----------|----------|-------|

**헌법 정렬 문제:** (있는 경우)

**매핑되지 않은 작업:** (있는 경우)

**지표:**

- 총 요구사항 수
- 총 작업 수
- 커버리지 % (1개 이상의 작업이 있는 요구사항)
- 모호성 수
- 중복 수
- 치명적 문제 수

### 7. 다음 작업 제안 (Next Actions)

보고서 끝에 간결한 다음 작업(Next Actions) 블록을 출력합니다:

- 치명적(CRITICAL) 문제가 있는 경우: `/speckit.implement` 전에 해결할 것을 권장
- 낮음/중간(LOW/MEDIUM) 문제만 있는 경우: 사용자가 진행할 수 있지만 개선 제안 제공
- 명시적인 명령어 제안: 예: "정제와 함께 /speckit.specify 실행", "아키텍처 조정을 위해 /speckit.plan 실행", "'performance-metrics' 커버리지 추가를 위해 tasks.md 수동 편집"

### 8. 해결 방안 제안

사용자에게 묻습니다: "상위 N개 문제에 대해 구체적인 해결 편집안을 제안해 드릴까요?" (자동으로 적용하지 마십시오.)

### 9. 확장 훅 확인

보고 후 프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
- 존재한다면 이를 읽고 `hooks.after_analyze` 키 아래의 항목을 찾습니다.
- YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
- `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
- 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
  - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
  - 훅에 비어 있지 않은 `condition`이 정의된 경우, 훅을 건너뛰고 조건 평가를 HookExecutor 구현에 맡깁니다.
- 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
  - **선택적 훅** (`optional: true`):
    ```
    ## 확장 훅 (Extension Hooks)

    **선택적 훅**: {extension}
    명령어: `/{command}`
    설명: {description}

    프롬프트: {prompt}
    실행하려면: `/{command}`
    ```
  - **필수 훅** (`optional: false`):
    ```
    ## 확장 훅 (Extension Hooks)

    **자동 훅**: {extension}
    실행 중: `/{command}`
    EXECUTE_COMMAND: {command}
    ```
- 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 조용히 건너뜜

## 운영 원칙 (Operating Principles)

### 컨텍스트 효율성

- **최소한의 고신호 토큰**: 포괄적인 문서화가 아니라 실행 가능한 발견 사항에 집중
- **점진적 노출**: 아티팩트를 점진적으로 로드하며, 모든 내용을 한꺼번에 분석에 쏟아붓지 않음
- **토큰 효율적 출력**: 발견 사항 테이블을 50행으로 제한하고 나머지는 요약
- **결정론적 결과**: 변경 없이 다시 실행하면 일관된 ID와 개수가 생성되어야 함

### 분석 지침

- **절대로 파일을 수정하지 마십시오** (이것은 읽기 전용 분석입니다)
- **절대로 누락된 섹션을 허구로 만들어내지 마십시오** (없는 경우 정확하게 보고하십시오)
- **헌법 위반을 우선시하십시오** (이것은 항상 치명적(CRITICAL)입니다)
- **포괄적인 규칙보다 예시를 사용하십시오** (일반적인 패턴이 아니라 구체적인 사례를 인용하십시오)
- **발견된 문제가 없는 경우 품위 있게 보고하십시오** (커버리지 통계와 함께 성공 보고서 출력)

## 컨텍스트

