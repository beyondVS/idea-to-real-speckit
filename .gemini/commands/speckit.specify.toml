description = "자연어 기능 설명을 바탕으로 기능 명세서를 생성하거나 업데이트합니다."

prompt = """

## 사용자 입력 (User Input)

```text
{{args}}
```

사용자 입력이 비어 있지 않은 경우, 진행하기 전에 이를 반드시 고려해야 합니다.

## 사전 실행 체크 (Pre-Execution Checks)

**확장 훅 확인 (명세 작성 전)**:
- 프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
- 존재한다면 이를 읽고 `hooks.before_specify` 키 아래의 항목을 찾습니다.
- YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
- `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
- 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
  - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
  - 훅에 비어 있지 않은 `condition`이 정의된 경우, 훅을 건너뛰고 조건 평가를 HookExecutor 구현에 맡깁니다.
- 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
  - **선택적 훅 (Optional hook)** (`optional: true`):
    ```
    ## 확장 훅 (Extension Hooks)

    **선택적 사전 훅**: {extension}
    명령어: `/{command}`
    설명: {description}

    프롬프트: {prompt}
    실행하려면: `/{command}`
    ```
  - **필수 훅 (Mandatory hook)** (`optional: false`):
    ```
    ## 확장 훅 (Extension Hooks)

    **자동 사전 훅**: {extension}
    실행 중: `/{command}`
    EXECUTE_COMMAND: {command}

    Goal로 진행하기 전에 훅 명령어의 결과를 기다리십시오.
    ```
- 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 조용히 건너뜁니다.

## 개요 (Outline)

트리거 메시지에서 `/speckit.specify` 다음에 사용자가 입력한 텍스트가 기능 설명입니다. `{{args}}`가 아래에 문자 그대로 나타나더라도 이 대화에서 항상 사용 가능하다고 가정하십시오. 사용자가 빈 명령을 제공하지 않는 한 반복해서 요청하지 마십시오.

해당 기능 설명을 바탕으로 다음을 수행하십시오:

1. **간결한 짧은 이름 생성** (2-4단어):
   - 기능 설명을 분석하고 가장 의미 있는 키워드를 추출합니다.
   - 기능의 본질을 담은 2-4단어의 짧은 이름을 생성합니다.
   - 가능한 경우 action-noun 형식을 사용합니다 (예: "add-user-auth", "fix-payment-bug").
   - 기술 용어 및 약어(OAuth2, API, JWT 등)를 유지합니다.
   - 간결하면서도 한눈에 기능을 이해할 수 있도록 설명적으로 작성합니다.
   - 예시:
     - "사용자 인증 기능을 추가하고 싶어" → "user-auth"
     - "API를 위한 OAuth2 연동 구현" → "oauth2-api-integration"
     - "분석용 대시보드 만들기" → "analytics-dashboard"
     - "결제 처리 타임아웃 버그 수정" → "fix-payment-timeout"

2. **브랜치 생성** (선택 사항, 훅을 통해 수행):

   위의 사전 실행 체크에서 `before_specify` 훅이 성공적으로 실행되었다면, git 브랜치를 생성/전환하고 `BRANCH_NAME` 및 `FEATURE_NUM`이 포함된 JSON을 출력했을 것입니다. 참고를 위해 이 값들을 기록해 두되, 브랜치 이름이 명세 디렉토리 이름을 결정하지는 않습니다.

   사용자가 명시적으로 `GIT_BRANCH_NAME`을 제공한 경우, 이를 훅에 전달하여 브랜치 스크립트가 접두사/접미사 생성 없이 해당 값을 브랜치 이름으로 정확히 사용하도록 하십시오.

3. **기능 명세 디렉토리 생성**:

   명세는 사용자가 명시적으로 `SPECIFY_FEATURE_DIRECTORY`를 제공하지 않는 한 기본적으로 `specs/` 디렉토리 아래에 위치합니다.

   **`SPECIFY_FEATURE_DIRECTORY` 결정 순서**:
   1. 사용자가 명시적으로 `SPECIFY_FEATURE_DIRECTORY`를 제공한 경우(예: 환경 변수, 인수 또는 설정을 통해), 그대로 사용합니다.
   2. 그렇지 않은 경우, `specs/` 아래에 자동 생성합니다:
      - `.specify/init-options.json`에서 `branch_numbering`을 확인합니다.
      - `"timestamp"`인 경우: 접두사는 `YYYYMMDD-HHMMSS` (현재 타임스탬프)입니다.
      - `"sequential"`이거나 없는 경우: 접두사는 `NNN` (기존 `specs/` 디렉토리를 스캔한 후 사용 가능한 다음 3자리 숫자)입니다.
      - 디렉토리 이름 생성: `<접두사>-<짧은-이름>` (예: `003-user-auth` 또는 `20260319-143022-user-auth`).
      - `SPECIFY_FEATURE_DIRECTORY`를 `specs/<디렉토리-이름>`으로 설정합니다.

   **디렉토리 및 명세 파일 생성**:
   - `mkdir -p SPECIFY_FEATURE_DIRECTORY` 실행
   - `.specify/templates/spec-template.md`를 `SPECIFY_FEATURE_DIRECTORY/spec.md`로 복사하여 시작점으로 사용합니다.
   - `SPEC_FILE`을 `SPECIFY_FEATURE_DIRECTORY/spec.md`로 설정합니다.
   - 결정된 경로를 `.specify/feature.json`에 저장합니다:
     ```json
     {
       "feature_directory": "<결정된 기능 디렉토리>"
     }
     ```
     리터럴 문자열 `SPECIFY_FEATURE_DIRECTORY`가 아니라 실제 결정된 디렉토리 경로 값(예: `specs/003-user-auth`)을 작성하십시오.
     이를 통해 후속 명령(`/speckit.plan`, `/speckit.tasks` 등)이 git 브랜치 명명 규칙에 의존하지 않고 기능 디렉토리를 찾을 수 있습니다.

   **중요**:
   - `/speckit.specify` 호출당 단 하나의 기능만 생성해야 합니다.
   - 명세 디렉토리 이름과 git 브랜치 이름은 독립적입니다. 동일할 수도 있지만 이는 사용자의 선택입니다.
   - 명세 디렉토리와 파일은 항상 이 명령어에 의해 생성되며, 훅에 의해 생성되지 않습니다.

4. 필요한 섹션을 이해하기 위해 `.specify/templates/spec-template.md`를 로드합니다.

5. 다음 실행 흐름을 따르십시오:
    1. 인수에서 사용자 설명을 파싱합니다.
       설명이 비어 있는 경우: ERROR "기능 설명이 제공되지 않았습니다."
    2. 설명에서 핵심 개념을 추출합니다.
       식별: 액터, 액션, 데이터, 제약 사항
    3. 명확하지 않은 부분에 대해:
       - 컨텍스트 및 산업 표준을 바탕으로 정보에 입각한 추측을 합니다.
       - 다음의 경우에만 [확인 필요(NEEDS CLARIFICATION): 구체적인 질문]으로 표시하십시오:
         - 선택이 기능 범위나 사용자 경험에 큰 영향을 미치는 경우
         - 서로 다른 의미를 지닌 여러 합리적인 해석이 존재하는 경우
         - 합리적인 기본값이 존재하지 않는 경우
       - **제한: 총 [확인 필요] 마커는 최대 3개까지입니다.**
       - 영향도에 따라 확인 우선순위를 정하십시오: 범위 > 보안/개인정보 > 사용자 경험 > 기술적 세부 사항
    4. 사용자 시나리오 및 테스트(User Scenarios & Testing) 섹션을 채웁니다.
       명확한 사용자 흐름이 없는 경우: ERROR "사용자 시나리오를 결정할 수 없습니다."
    5. 기능적 요구사항(Functional Requirements)을 생성합니다.
       각 요구사항은 테스트 가능해야 합니다.
       명시되지 않은 세부 사항에 대해 합리적인 기본값을 사용하십시오 (가정 사항(Assumptions) 섹션에 기록).
    6. 성공 기준(Success Criteria)을 정의합니다.
       측정 가능하고 기술 중립적인 결과를 생성합니다.
       정량적 지표(시간, 성능, 규모)와 정성적 측정(사용자 만족도, 작업 완료)을 모두 포함합니다.
       각 기준은 구현 세부 사항 없이 검증 가능해야 합니다.
    7. 주요 엔티티(Key Entities) 식별 (데이터가 포함된 경우).
    8. 반환: SUCCESS (명세가 계획 단계를 위해 준비됨)

6. 템플릿 구조를 사용하여 `SPEC_FILE`에 명세를 작성합니다. 섹션 순서와 헤더를 유지하면서 플레이스홀더를 기능 설명(인수)에서 파생된 구체적인 세부 사항으로 교체합니다.

7. **명세 품질 검증 (Specification Quality Validation)**: 초기 명세를 작성한 후 품질 기준에 따라 검증합니다.

   a. **명세 품질 체크리스트 생성**: `SPECIFY_FEATURE_DIRECTORY/checklists/requirements.md`에 체크리스트 템플릿 구조를 사용하여 다음 검증 항목이 포함된 체크리스트 파일을 생성합니다.

      ```markdown
      # 명세 품질 체크리스트: [FEATURE NAME]
      
      **목적**: 계획 단계로 넘어가기 전에 명세의 완전성과 품질 검증
      **생성일**: [DATE]
      **기능**: [spec.md 링크]
      
      ## 콘텐츠 품질
      
      - [ ] 구현 세부 사항(언어, 프레임워크, API)이 포함되지 않음
      - [ ] 사용자 가치 및 비즈니스 요구사항에 집중함
      - [ ] 기술 지식이 없는 이해관계자를 위해 작성됨
      - [ ] 모든 필수 섹션이 완료됨
      
      ## 요구사항 완전성
      
      - [ ] [확인 필요] 마커가 남아 있지 않음
      - [ ] 요구사항이 테스트 가능하고 명확함
      - [ ] 성공 기준이 측정 가능함
      - [ ] 성공 기준이 기술 중립적임 (구현 세부 사항 없음)
      - [ ] 모든 수락 시나리오가 정의됨
      - [ ] 예외 케이스가 식별됨
      - [ ] 범위가 명확하게 제한됨
      - [ ] 의존성 및 가정 사항이 식별됨
      
      ## 기능 준비 상태
      
      - [ ] 모든 기능적 요구사항에 명확한 수락 기준이 있음
      - [ ] 사용자 시나리오가 주요 흐름을 포괄함
      - [ ] 기능이 성공 기준에 정의된 측정 가능한 결과를 충족함
      - [ ] 명세에 구현 세부 사항이 노출되지 않음
      
      ## 참고 (Notes)
      
      - 완료되지 않은 항목은 `/speckit.clarify` 또는 `/speckit.plan`을 실행하기 전에 명세 업데이트가 필요함
      ```

   b. **검증 체크 실행**: 각 체크리스트 항목에 대해 명세를 검토합니다.
      - 각 항목에 대해 통과 또는 실패 여부를 결정합니다.
      - 발견된 구체적인 문제(관련 명세 섹션 인용)를 문서화합니다.

   c. **검증 결과 처리**:

      - **모든 항목 통과 시**: 체크리스트를 완료로 표시하고 7단계로 진행합니다.

      - **항목 실패 시 ([확인 필요] 제외)**:
        1. 실패한 항목과 구체적인 문제를 나열합니다.
        2. 각 문제를 해결하도록 명세를 업데이트합니다.
        3. 모든 항목이 통과될 때까지 검증을 다시 실행합니다 (최대 3회 반복).
        4. 3회 반복 후에도 여전히 실패하는 경우, 남은 문제를 체크리스트 참고 사항에 기록하고 사용자에게 경고합니다.

      - **[확인 필요] 마커가 남아 있는 경우**:
        1. 명세에서 모든 [확인 필요: ...] 마커를 추출합니다.
        2. **제한 확인**: 마커가 3개 이상인 경우, 가장 중요한 3개(범위/보안/UX 영향도 기준)만 남기고 나머지는 합리적인 추측을 합니다.
        3. 확인이 필요한 각 사항(최대 3개)에 대해 사용자에게 다음 형식으로 옵션을 제시합니다.

           ```markdown
           ## 질문 [N]: [주제]
           
           **컨텍스트**: [관련 명세 섹션 인용]
           
           **확인이 필요한 내용**: [[확인 필요] 마커의 구체적인 질문]
           
           **제안된 답변**:
           
           | 옵션 | 답변 | 영향 |
           |--------|--------|--------------|
           | A      | [첫 번째 제안 답변] | [기능에 미치는 의미] |
           | B      | [두 번째 제안 답변] | [기능에 미치는 의미] |
           | C      | [세 번째 제안 답변] | [기능에 미치는 의미] |
           | 사용자 정의 | 직접 답변 제공 | [사용자 정의 입력을 제공하는 방법 설명] |
           
           **선택**: _[사용자 응답 대기]_
           ```

        4. **중요 - 테이블 포맷팅**: 마크다운 테이블이 올바르게 포맷되었는지 확인하십시오:
           - 파이프 기호를 정렬하여 일관된 간격을 사용합니다.
           - 각 셀 내용 주위에 공백을 둡니다: `|내용|`이 아니라 `| 내용 |`.
           - 헤더 구분선은 최소 3개의 대시를 사용해야 합니다: `|--------|`.
           - 마크다운 미리보기에서 테이블이 올바르게 렌더링되는지 테스트하십시오.
        5. 질문에 순차적으로 번호(Q1, Q2, Q3 - 총 최대 3개)를 매깁니다.
        6. 응답을 기다리기 전에 모든 질문을 함께 제시합니다.
        7. 모든 질문에 대한 사용자의 선택을 기다립니다 (예: "Q1: A, Q2: 사용자 정의 - [세부 사항], Q3: B").
        8. 각 [확인 필요] 마커를 사용자가 선택하거나 제공한 답변으로 교체하여 명세를 업데이트합니다.
        9. 모든 확인이 해결된 후 검증을 다시 실행합니다.

   d. **체크리스트 업데이트**: 각 검증 반복 후에 체크리스트 파일을 현재 통과/실패 상태로 업데이트합니다.

8. 사용자에게 **완료 보고**:
   - `SPECIFY_FEATURE_DIRECTORY` — 기능 디렉토리 경로
   - `SPEC_FILE` — 명세 파일 경로
   - 체크리스트 결과 요약
   - 다음 단계 준비 상태 (`/speckit.clarify` 또는 `/speckit.plan`)

9. **확장 훅 확인**: 완료 보고 후 프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
   - 존재한다면 이를 읽고 `hooks.after_specify` 키 아래의 항목을 찾습니다.
   - YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
   - `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
   - 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
     - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
     - 훅에 비어 있지 않은 `condition`이 정의된 경우, 훅을 건너뛰고 조건 평가를 HookExecutor 구현에 맡깁니다.
   - 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
     - **선택적 훅** (`optional: true`):
       ```
       ## 확장 훅 (Extension Hooks)

       **선택적 훅**: {extension}
       명령어: `/{command}`
       설명: {description}

       프롬프트: {prompt}
       실행하려면: `/{command}`
       ```
     - **필수 훅** (`optional: false`):
       ```
       ## 확장 훅 (Extension Hooks)

       **자동 훅**: {extension}
       실행 중: `/{command}`
       EXECUTE_COMMAND: {command}
       ```
   - 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 조용히 건너뜜

**참고:** 브랜치 생성은 `before_specify` 훅(git 확장)에 의해 처리됩니다. 명세 디렉토리 및 파일 생성은 항상 이 핵심 명령어에 의해 처리됩니다.

## 빠른 지침 (Quick Guidelines)

- 사용자가 필요로 하는 **무엇(WHAT)**과 **왜(WHY)**에 집중하십시오.
- 구현 방법(**HOW**)은 피하십시오 (기술 스택, API, 코드 구조 없음).
- 개발자가 아닌 비즈니스 이해관계자를 위해 작성하십시오.
- 명세에 포함된 어떠한 체크리스트도 생성하지 마십시오. 그것은 별도의 명령어가 될 것입니다.

### 섹션 요구사항

- **필수 섹션**: 모든 기능에 대해 완료되어야 합니다.
- **선택 섹션**: 기능과 관련이 있는 경우에만 포함하십시오.
- 섹션이 해당되지 않는 경우 완전히 제거하십시오 ("N/A"로 남겨두지 마십시오).

### AI 생성 가이드

사용자 프롬프트에서 이 명세를 생성할 때:

1. **정보에 입각한 추측**: 문맥, 산업 표준 및 일반적인 패턴을 사용하여 공백을 채우십시오.
2. **가정 사항 기록**: 합리적인 기본값들을 가정 사항(Assumptions) 섹션에 기록하십시오.
3. **확인 제한**: [확인 필요] 마커는 최대 3개로 제한하십시오. 다음의 중요한 결정에만 사용하십시오:
   - 기능 범위나 사용자 경험에 큰 영향을 미치는 경우
   - 서로 다른 의미를 지닌 여러 합리적인 해석이 존재하는 경우
   - 합리적인 기본값이 없는 경우
4. **확인 우선순위**: 범위 > 보안/개인정보 > 사용자 경험 > 기술적 세부 사항
5. **테스터처럼 생각하기**: 모든 모호한 요구사항은 체크리스트의 "테스트 가능하고 명확함" 항목에서 탈락해야 합니다.
6. **확인이 필요한 일반적인 분야** (합리적인 기본값이 없는 경우에만):
   - 기능 범위 및 경계 (특정 유스케이스 포함/제외)
   - 사용자 유형 및 권한 (여러 상충되는 해석이 가능한 경우)
   - 보안/준수 요구사항 (법적/재정적으로 중요한 경우)

**합리적인 기본값의 예시** (이들에 대해 질문하지 마십시오):

- 데이터 보관: 해당 도메인의 업계 표준 관행
- 성능 목표: 특별히 명시되지 않는 한 표준 웹/모바일 앱 기대치
- 에러 처리: 적절한 대체 수단이 포함된 사용자 친화적인 메시지
- 인증 방법: 웹 앱의 경우 표준 세션 기반 또는 OAuth2
- 통합 패턴: 프로젝트에 적절한 패턴 사용 (웹 서비스의 경우 REST/GraphQL, 라이브러리의 경우 함수 호출, 도구의 경우 CLI 인수 등)

### 성공 기준 지침

성공 기준은 다음과 같아야 합니다:

1. **측정 가능**: 구체적인 지표(시간, 백분율, 횟수, 비율)를 포함합니다.
2. **기술 중립적**: 프레임워크, 언어, 데이터베이스 또는 도구에 대한 언급이 없어야 합니다.
3. **사용자 중심**: 시스템 내부가 아닌 사용자/비즈니스 관점에서의 결과를 설명합니다.
4. **검증 가능**: 구현 세부 사항을 몰라도 테스트/검증할 수 있어야 합니다.

**좋은 예시**:

- "사용자는 3분 이내에 결제를 완료할 수 있음"
- "시스템은 10,000명의 동시 사용자를 지원함"
- "검색의 95%가 1초 이내에 결과를 반환함"
- "작업 완료율이 40% 향상됨"

**나쁜 예시** (구현 중심):

- "API 응답 시간이 200ms 미만임" (너무 기술적임, "사용자가 결과를 즉시 확인 가능" 사용)
- "데이터베이스가 1000 TPS를 처리할 수 있음" (구현 세부 사항, 사용자 대상 지표 사용)
- "React 컴포넌트가 효율적으로 렌더링됨" (프레임워크 종속적)
- "Redis 캐시 적중률이 80% 이상임" (기술 종속적)"""
