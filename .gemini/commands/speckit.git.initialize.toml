description = "초기 커밋과 함께 Git 리포지토리를 초기화합니다."

# Source: git

prompt = """
# Git 리포지토리 초기화 (Initialize Git Repository)

현재 프로젝트 디렉토리에 Git 리포지토리가 아직 존재하지 않는 경우 초기화합니다.

## 실행 (Execution)

프로젝트 루트에서 해당 스크립트를 실행합니다:

- **Bash**: `.specify/extensions/git/scripts/bash/initialize-repo.sh`
- **PowerShell**: `.specify/extensions/git/scripts/powershell/initialize-repo.ps1`

확장 스크립트를 찾을 수 없는 경우 다음을 대신 사용합니다:
- **Bash**: `git init && git add . && git commit -m "Specify 템플릿으로부터 초기 커밋"`
- **PowerShell**: `git init; git add .; git commit -m "Specify 템플릿으로부터 초기 커밋"`

스크립트는 내부적으로 모든 확인 과정을 처리합니다:
- Git을 사용할 수 없는 경우 건너뜁니다.
- 이미 Git 리포지토리 내부인 경우 건너뜁니다.
- `git init`, `git add .`, `git commit`을 초기 커밋 메시지와 함께 실행합니다.

## 사용자 정의 (Customization)

프로젝트별 Git 초기화 단계를 추가하려면 스크립트를 교체하십시오:
- 사용자 정의 `.gitignore` 템플릿
- 기본 브랜치 이름 설정 (`git config init.defaultBranch`)
- Git LFS 설정
- Git 훅(hooks) 설치
- 커밋 서명 설정
- Git Flow 초기화

## 출력 (Output)

성공 시:
- `✓ Git 리포지토리가 초기화되었습니다.`

## 예외 처리 (Graceful Degradation)

Git이 설치되어 있지 않은 경우:
- 사용자에게 경고합니다.
- 리포지토리 초기화를 건너뜁니다.
- 프로젝트는 Git 없이도 계속 작동합니다 (명세는 여전히 `specs/` 아래에 생성될 수 있음).

Git이 설치되어 있지만 `git init`, `git add .` 또는 `git commit`이 실패하는 경우:
- 사용자에게 에러를 표시합니다.
- 부분적으로 초기화된 리포지토리 상태로 계속 진행하지 않고 이 명령을 중단합니다.
"""
