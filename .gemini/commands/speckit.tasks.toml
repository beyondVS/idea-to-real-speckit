## 작업 생성 규칙 (Task Generation Rules)

**중요**: 독립적인 구현과 테스트가 가능하도록 작업은 반드시 **사용자 스토리별로 조직**되어야 합니다.

**테스트는 선택 사항(OPTIONAL)**: 기능 명세서에서 명시적으로 요청되거나 사용자가 TDD 방식을 요청한 경우에만 테스트 작업을 생성하십시오.

### 체크리스트 형식 (필수)

모든 작업은 반드시 이 형식을 엄격히 따라야 합니다:

```text
- [ ] [TaskID] [P?] [Story?] 설명 및 파일 경로
```

**형식 구성 요소**:

1. **체크박스**: 항상 `- [ ]` (마크다운 체크박스)로 시작합니다.
2. **Task ID**: 실행 순서에 따른 일련번호 (T001, T002, T003...).
3. **[P] 마커**: 작업이 병렬화 가능한 경우에만 포함합니다 (서로 다른 파일, 완료되지 않은 작업에 대한 의존성 없음).
4. **[Story] 레이블**: 사용자 스토리 단계 작업에만 필수입니다.
   - 형식: [US1], [US2], [US3] 등 (`spec.md`의 사용자 스토리와 매핑).
   - 설정(Setup) 단계: 스토리 레이블 없음.
   - 기반(Foundational) 단계: 스토리 레이블 없음.
   - 사용자 스토리 단계: 반드시 스토리 레이블이 있어야 함.
   - 마무리(Polish) 단계: 스토리 레이블 없음.
5. **설명**: 정확한 파일 경로가 포함된 명확한 동작.

**예시**:

- ✅ 올바름: `- [ ] T001 구현 계획에 따라 프로젝트 구조 생성`
- ✅ 올바름: `- [ ] T005 [P] src/middleware/auth.py에 인증 미들웨어 구현`
- ✅ 올바름: `- [ ] T012 [P] [US1] src/models/user.py에 User 모델 생성`
- ✅ 올바름: `- [ ] T014 [US1] src/services/user_service.py에 UserService 구현`
- ❌ 틀림: `- [ ] User 모델 생성` (ID 및 스토리 레이블 누락)
- ❌ 틀림: `T001 [US1] 모델 생성` (체크박스 누락)
- ❌ 틀림: `- [ ] [US1] User 모델 생성` (Task ID 누락)
- ❌ 틀림: `- [ ] T001 [US1] 모델 생성` (파일 경로 누락)

### 작업 조직 (Task Organization)

1. **사용자 스토리로부터 (spec.md)** - 주요 조직 원칙:
   - 각 사용자 스토리(P1, P2, P3...)는 자체 단계를 갖습니다.
   - 모든 관련 컴포넌트를 해당 스토리에 매핑합니다:
     - 해당 스토리에 필요한 모델
     - 해당 스토리에 필요한 서비스
     - 해당 스토리에 필요한 인터페이스/UI
     - 테스트가 요청된 경우: 해당 스토리에 특화된 테스트
   - 스토리 의존성을 표시합니다 (대부분의 스토리는 독립적이어야 함).

2. **계약으로부터 (Contracts)**:
   - 각 인터페이스 계약을 해당 서비스가 제공하는 사용자 스토리에 매핑합니다.
   - 테스트가 요청된 경우: 각 인터페이스 계약 → 해당 스토리 단계에서 구현 전 계약 테스트 작업 [P] 추가.

3. **데이터 모델로부터 (Data Model)**:
   - 각 엔티티를 그것을 필요로 하는 사용자 스토리에 매핑합니다.
   - 엔티티가 여러 스토리에 쓰이는 경우: 가장 이른 스토리 또는 설정(Setup) 단계에 배치합니다.
   - 관계 → 적절한 스토리 단계의 서비스 레이어 작업.

4. **설정/인프라로부터 (Setup/Infrastructure)**:
   - 공유 인프라 → 설정 단계 (Phase 1)
   - 기반/차단 작업 → 기반 작업 단계 (Phase 2)
   - 스토리 특화 설정 → 해당 스토리 단계 내부에 배치

### 단계 구조 (Phase Structure)

- **Phase 1**: 설정 (프로젝트 초기화)
- **Phase 2**: 기반 작업 (차단 선행 조건 - 사용자 스토리 시작 전에 반드시 완료해야 함)
- **Phase 3+**: 우선순위 순서에 따른 사용자 스토리 (P1, P2, P3...)
  - 각 스토리 내에서: 테스트(요청된 경우) → 모델 → 서비스 → 엔드포인트 → 통합
  - 각 단계는 완전하고 독립적으로 테스트 가능한 증분이어야 함
- **최종 단계**: 마무리 및 횡단 관심사
"""
