   - 사용자 스토리 완료 순서를 보여주는 의존성 그래프를 생성합니다.
   - 사용자 스토리별 병렬 실행 예시를 만듭니다.
   - 작업 완전성을 검증합니다 (각 사용자 스토리에 필요한 모든 작업이 있고 독립적으로 테스트 가능한지 확인).

4. **tasks.md 생성**: `.specify/templates/tasks-template.md`를 구조로 사용하여 다음 내용을 채웁니다:
   - `plan.md`에서 가져온 정확한 기능 이름
   - Phase 1: 설정 작업 (프로젝트 초기화)
   - Phase 2: 기반 작업 (모든 사용자 스토리에 대한 차단 선행 조건)
   - Phase 3+: 각 사용자 스토리당 하나의 단계 (spec.md의 우선순위 순서대로)
   - 각 단계 포함 사항: 스토리 목표, 독립적 테스트 기준, 테스트(요청된 경우), 구현 작업
