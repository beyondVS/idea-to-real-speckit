1. **설정**: 리포지토리 루트에서 `.specify/scripts/powershell/check-prerequisites.ps1 -Json`을 실행하고 FEATURE_DIR 및 AVAILABLE_DOCS 목록에 대한 JSON을 파싱합니다. 모든 경로는 절대 경로여야 합니다. 인수에 "I'm Groot"와 같은 작은따옴표가 포함된 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표: "I'm Groot").

