   - **선택**: `data-model.md` (엔티티), `contracts/` (인터페이스 계약), `research.md` (결정 사항), `quickstart.md` (테스트 시나리오)
   - 참고: 모든 프로젝트에 모든 문서가 있는 것은 아닙니다. 사용 가능한 문서를 바탕으로 작업을 생성하십시오.

3. **작업 생성 워크플로우 실행**:
   - `plan.md`를 로드하여 기술 스택, 라이브러리, 프로젝트 구조를 추출합니다.
   - `spec.md`를 로드하여 사용자 스토리와 그 우선순위(P1, P2, P3 등)를 추출합니다.
   - `data-model.md`가 존재하는 경우: 엔티티를 추출하고 사용자 스토리에 매핑합니다.
