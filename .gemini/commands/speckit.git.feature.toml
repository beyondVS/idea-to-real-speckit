description = "순차 번호 또는 타임스탬프를 사용하여 기능 브랜치를 생성합니다."

# Source: git

prompt = """
# 기능 브랜치 생성 (Create Feature Branch)

제공된 명세에 대해 새로운 git 기능 브랜치를 생성하고 해당 브랜치로 전환합니다. 이 명령어는 **브랜치 생성만** 담당하며, 명세 디렉토리와 파일은 핵심 `/speckit.specify` 워크플로우에 의해 생성됩니다.

## 사용자 입력 (User Input)

```text
{{args}}
```

사용자 입력이 비어 있지 않은 경우, 진행하기 전에 이를 반드시 고려해야 합니다.

## 환경 변수 재정의 (Environment Variable Override)

사용자가 명시적으로 `GIT_BRANCH_NAME`을 제공한 경우 (예: 환경 변수, 인수 또는 요청을 통해), 스크립트를 호출하기 전에 `GIT_BRANCH_NAME` 환경 변수를 설정하여 스크립트에 전달하십시오. `GIT_BRANCH_NAME`이 설정된 경우:
- 스크립트는 접두사/접미사 생성 없이 해당 값을 브랜치 이름으로 정확히 사용합니다.
- `--short-name`, `--number`, `--timestamp` 플래그는 무시됩니다.
- 이름이 숫자 접두사로 시작하는 경우 `FEATURE_NUM`이 추출되고, 그렇지 않으면 전체 브랜치 이름으로 설정됩니다.

## 선행 조건 (Prerequisites)

- `git rev-parse --is-inside-work-tree 2>/dev/null`을 실행하여 Git을 사용할 수 있는지 확인합니다.
- Git을 사용할 수 없는 경우 사용자에게 알리고 브랜치 생성을 건너뜁니다.

## 브랜치 번호 매기기 모드 (Branch Numbering Mode)

다음 순서대로 설정을 확인하여 브랜치 번호 매기기 전략을 결정합니다:

1. `.specify/extensions/git/git-config.yml`에서 `branch_numbering` 값 확인.
2. `.specify/init-options.json`에서 `branch_numbering` 값 확인 (하위 호환성용).
3. 둘 다 없는 경우 기본값은 `sequential`(순차)입니다.

## 실행 (Execution)

브랜치에 대한 간결한 짧은 이름(2-4단어)을 생성합니다:
- 기능 설명을 분석하고 가장 의미 있는 키워드를 추출합니다.
- 가능한 경우 action-noun 형식을 사용합니다 (예: "add-user-auth", "fix-payment-bug").
- 기술 용어 및 약어(OAuth2, API, JWT 등)를 유지합니다.

플랫폼에 맞는 스크립트를 실행합니다:

- **Bash**: `.specify/extensions/git/scripts/bash/create-new-feature.sh --json --short-name "<short-name>" "<기능 설명>"`
- **Bash (timestamp)**: `.specify/extensions/git/scripts/bash/create-new-feature.sh --json --timestamp --short-name "<short-name>" "<기능 설명>"`
- **PowerShell**: `.specify/extensions/git/scripts/powershell/create-new-feature.ps1 -Json -ShortName "<short-name>" "<기능 설명>"`
- **PowerShell (timestamp)**: `.specify/extensions/git/scripts/powershell/create-new-feature.ps1 -Json -Timestamp -ShortName "<short-name>" "<기능 설명>"`

**중요**:
- `--number`를 전달하지 마십시오 — 스크립트가 자동으로 다음 번호를 결정합니다.
- 출력을 안정적으로 파싱할 수 있도록 항상 JSON 플래그(Bash의 경우 `--json`, PowerShell의 경우 `-Json`)를 포함하십시오.
- 이 스크립트는 기능당 한 번만 실행해야 합니다.
- JSON 출력에는 `BRANCH_NAME`과 `FEATURE_NUM`이 포함됩니다.

## 예외 처리 (Graceful Degradation)

Git이 설치되어 있지 않거나 현재 디렉토리가 Git 리포지토리가 아닌 경우:
- `[specify] Warning: Git repository not detected; skipped branch creation` 경고와 함께 브랜치 생성을 건너뜁니다.
- 호출자가 참조할 수 있도록 스크립트는 여전히 `BRANCH_NAME`과 `FEATURE_NUM`을 출력합니다.

## 출력 (Output)

스크립트는 다음을 포함하는 JSON을 출력합니다:
- `BRANCH_NAME`: 브랜치 이름 (예: `003-user-auth` 또는 `20260319-143022-user-auth`)
- `FEATURE_NUM`: 사용된 숫자 또는 타임스탬프 접두사
"""
