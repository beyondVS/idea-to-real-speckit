description = "tasks.md에 정의된 모든 작업을 처리하고 실행하여 구현 계획을 수행합니다."

prompt = """

## 사용자 입력 (User Input)

```text
{{args}}
```

사용자 입력이 비어 있지 않은 경우, 진행하기 전에 이를 반드시 고려해야 합니다.

## 사전 실행 체크 (Pre-Execution Checks)

**확장 훅 확인 (구현 전)**:
- 프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
- 존재한다면 이를 읽고 `hooks.before_implement` 키 아래의 항목을 찾습니다.
- YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
- `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
- 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
  - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
  - 훅에 비어 있지 않은 `condition`이 정의된 경우, 훅을 건너뛰고 조건 평가를 HookExecutor 구현에 맡깁니다.
- 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
  - **선택적 훅** (`optional: true`):
    ```
    ## 확장 훅 (Extension Hooks)

    **선택적 사전 훅**: {extension}
    명령어: `/{command}`
    설명: {description}

    프롬프트: {prompt}
    실행하려면: `/{command}`
    ```
  - **필수 훅** (`optional: false`):
    ```
    ## 확장 훅 (Extension Hooks)

    **자동 사전 훅**: {extension}
    실행 중: `/{command}`
    EXECUTE_COMMAND: {command}
    
    Outline으로 진행하기 전에 훅 명령어의 결과를 기다리십시오.
    ```
- 등록된 훅이 없거나 `.specify/extensions.yml`이 존재하지 않으면 조용히 건너뜜

## 개요 (Outline)

1. 리포지토리 루트에서 `.specify/scripts/powershell/check-prerequisites.ps1 -Json -RequireTasks -IncludeTasks`를 실행하고 FEATURE_DIR 및 AVAILABLE_DOCS 목록을 파싱합니다. 모든 경로는 절대 경로여야 합니다. 인수에 "I'm Groot"와 같은 작은따옴표가 포함된 경우 이스케이프 구문을 사용하십시오: 예: 'I'\\''m Groot' (또는 가능한 경우 큰따옴표: "I'm Groot").

2. **체크리스트 상태 확인** (FEATURE_DIR/checklists/가 존재하는 경우):
   - `checklists/` 디렉토리의 모든 체크리스트 파일을 스캔합니다.
   - 각 체크리스트에 대해 다음을 계산합니다:
     - 총 항목 수: `- [ ]`, `- [X]`, `- [x]`와 일치하는 모든 라인
     - 완료된 항목 수: `- [X]` 또는 `- [x]`와 일치하는 라인
     - 미완료 항목 수: `- [ ]`와 일치하는 라인
   - 상태 테이블 생성:

     ```text
     | 체크리스트 | 총계 | 완료 | 미완료 | 상태 |
     |-----------|-------|-----------|------------|--------|
     | ux.md     | 12    | 12        | 0          | ✓ PASS |
     | test.md   | 8     | 5         | 3          | ✗ FAIL |
     | security.md | 6   | 6         | 0          | ✓ PASS |
     ```

   - 전체 상태 계산:
     - **PASS**: 모든 체크리스트의 미완료 항목이 0개인 경우
     - **FAIL**: 하나 이상의 체크리스트에 미완료 항목이 있는 경우

   - **미완료 체크리스트가 있는 경우**:
     - 미완료 항목 수가 포함된 테이블을 표시합니다.
     - **중단**하고 질문합니다: "일부 체크리스트가 완료되지 않았습니다. 그래도 구현을 진행하시겠습니까? (yes/no)"
     - 사용자의 응답을 기다린 후 계속합니다.
     - 사용자가 "no", "wait", "stop"이라고 답하면 실행을 중단합니다.
     - 사용자가 "yes", "proceed", "continue"라고 답하면 3단계로 진행합니다.

   - **모든 체크리스트가 완료된 경우**:
     - 모든 체크리스트가 통과되었음을 보여주는 테이블을 표시합니다.
     - 자동으로 3단계로 진행합니다.

3. 구현 컨텍스트 로드 및 분석:
   - **필수**: 전체 작업 목록 및 실행 계획을 위해 `tasks.md`를 읽습니다.
   - **필수**: 기술 스택, 아키텍처 및 파일 구조를 위해 `plan.md`를 읽습니다.
   - **존재하는 경우**: 엔티티 및 관계를 위해 `data-model.md`를 읽습니다.
   - **존재하는 경우**: API 명세 및 테스트 요구사항을 위해 `contracts/`를 읽습니다.
   - **존재하는 경우**: 기술적 결정 및 제약 사항을 위해 `research.md`를 읽습니다.
   - **존재하는 경우**: 통합 시나리오를 위해 `quickstart.md`를 읽습니다.

4. **프로젝트 설정 검증**:
   - **필수**: 실제 프로젝트 설정을 기반으로 무시(ignore) 파일을 생성/검증합니다:

   **감지 및 생성 로직**:
   - 다음 명령어가 성공하는지 확인하여 리포지토리가 git 리포지토리인지 확인합니다 (맞다면 `.gitignore` 생성/검증):

     ```sh
     git rev-parse --git-dir 2>/dev/null
     ```

   - `Dockerfile*`이 존재하거나 `plan.md`에 Docker가 있는 경우 → `.dockerignore` 생성/검증
   - `.eslintrc*`가 존재하는 경우 → `.eslintignore` 생성/검증
   - `eslint.config.*`가 존재하는 경우 → 설정의 `ignores` 항목이 필요한 패턴을 포함하는지 확인
   - `.prettierrc*`가 존재하는 경우 → `.prettierignore` 생성/검증
   - `.npmrc` 또는 `package.json`이 존재하는 경우 → `.npmignore` 생성/검증 (배포 시)
   - terraform 파일(`*.tf`)이 존재하는 경우 → `.terraformignore` 생성/검증
   - `.helmignore`가 필요한 경우 (helm 차트 존재 시) → `.helmignore` 생성/검증

   **무시 파일이 이미 존재하는 경우**: 필수 패턴이 포함되어 있는지 확인하고, 누락된 중요한 패턴만 추가합니다.
   **무시 파일이 없는 경우**: 감지된 기술에 대한 전체 패턴 세트를 사용하여 생성합니다.

   **기술별 공통 패턴** (`plan.md` 기술 스택 기준):
   - **Node.js/JavaScript/TypeScript**: `node_modules/`, `dist/`, `build/`, `*.log`, `.env*`
   - **Python**: `__pycache__/`, `*.pyc`, `.venv/`, `venv/`, `dist/`, `*.egg-info/`
   - **Java**: `target/`, `*.class`, `*.jar`, `.gradle/`, `build/`
   - **C#/.NET**: `bin/`, `obj/`, `*.user`, `*.suo`, `packages/`
   - **Go**: `*.exe`, `*.test`, `vendor/`, `*.out`
   - **Ruby**: `.bundle/`, `log/`, `tmp/`, `*.gem`, `vendor/bundle/`
   - **PHP**: `vendor/`, `*.log`, `*.cache`, `*.env`
   - **Rust**: `target/`, `debug/`, `release/`, `*.rs.bk`, `*.rlib`, `*.prof*`, `.idea/`, `*.log`, `.env*`
   - **Kotlin**: `build/`, `out/`, `.gradle/`, `.idea/`, `*.class`, `*.jar`, `*.iml`, `*.log`, `.env*`
   - **C++**: `build/`, `bin/`, `obj/`, `out/`, `*.o`, `*.so`, `*.a`, `*.exe`, `*.dll`, `.idea/`, `*.log`, `.env*`
   - **C**: `build/`, `bin/`, `obj/`, `out/`, `*.o`, `*.a`, `*.so`, `*.exe`, `*.dll`, `autom4te.cache/`, `config.status`, `config.log`, `.idea/`, `*.log`, `.env*`
   - **Swift**: `.build/`, `DerivedData/`, `*.swiftpm/`, `Packages/`
   - **R**: `.Rproj.user/`, `.Rhistory`, `.RData`, `.Ruserdata`, `*.Rproj`, `packrat/`, `renv/`
   - **범용**: `.DS_Store`, `Thumbs.db`, `*.tmp`, `*.swp`, `.vscode/`, `.idea/`

   **도구별 패턴**:
   - **Docker**: `node_modules/`, `.git/`, `Dockerfile*`, `.dockerignore`, `*.log*`, `.env*`, `coverage/`
   - **ESLint**: `node_modules/`, `dist/`, `build/`, `coverage/`, `*.min.js`
   - **Prettier**: `node_modules/`, `dist/`, `build/`, `coverage/`, `package-lock.json`, `yarn.lock`, `pnpm-lock.yaml`
   - **Terraform**: `.terraform/`, `*.tfstate*`, `*.tfvars`, `.terraform.lock.hcl`
   - **Kubernetes/k8s**: `*.secret.yaml`, `secrets/`, `.kube/`, `kubeconfig*`, `*.key`, `*.crt`

5. `tasks.md` 구조를 파싱하고 다음을 추출합니다:
   - **작업 단계 (Task phases)**: 설정(Setup), 테스트(Tests), 핵심(Core), 통합(Integration), 마무리(Polish)
   - **작업 의존성**: 순차적 vs 병렬 실행 규칙
   - **작업 세부 사항**: ID, 설명, 파일 경로, 병렬 마커 [P]
   - **실행 흐름**: 순서 및 의존성 요구사항

6. 작업 계획에 따라 구현을 실행합니다:
   - **단계별 실행**: 다음 단계로 넘어가기 전에 각 단계를 완료합니다.
   - **의존성 준수**: 순차적 작업은 순서대로 실행하고, 병렬 작업 [P]은 함께 실행할 수 있습니다.
   - **TDD 접근 방식 준수**: 해당 구현 작업 전에 테스트 작업을 실행합니다.
   - **파일 기반 조정**: 동일한 파일에 영향을 미치는 작업은 순차적으로 실행해야 합니다.
   - **검증 체크포인트**: 진행하기 전에 각 단계의 완료를 확인합니다.

7. 구현 실행 규칙:
   - **설정 우선**: 프로젝트 구조, 의존성, 구성을 초기화합니다.
   - **코드 전 테스트**: 계약, 엔티티 및 통합 시나리오에 대한 테스트를 작성해야 하는 경우 먼저 수행합니다.
   - **핵심 개발**: 모델, 서비스, CLI 명령, 엔드포인트를 구현합니다.
   - **통합 작업**: 데이터베이스 연결, 미들웨어, 로깅, 외부 서비스를 구현합니다.
   - **마무리 및 검증**: 유닛 테스트, 성능 최적화, 문서를 작성합니다.

8. 진행 상황 추적 및 에러 처리:
   - 각 작업 완료 후 진행 상황을 보고합니다.
   - 병렬이 아닌 작업이 실패하면 실행을 중단합니다.
   - 병렬 작업 [P]의 경우, 성공한 작업은 계속 진행하고 실패한 작업은 보고합니다.
   - 디버깅을 위한 컨텍스트가 포함된 명확한 에러 메시지를 제공합니다.
   - 구현을 진행할 수 없는 경우 다음 단계를 제안합니다.
   - **중요**: 완료된 작업에 대해서는 작업 파일에서 반드시 `[X]`로 체크 표시를 하십시오.

9. 완료 검증:
   - 필요한 모든 작업이 완료되었는지 확인합니다.
   - 구현된 기능이 원래의 명세와 일치하는지 확인합니다.
   - 테스트가 통과되고 커버리지가 요구사항을 충족하는지 검증합니다.
   - 구현이 기술 계획을 따르는지 확인합니다.
   - 완료된 작업 요약과 함께 최종 상태를 보고합니다.

참고: 이 명령어는 `tasks.md`에 완전한 작업 분해가 존재한다고 가정합니다. 작업이 불완전하거나 누락된 경우, 먼저 `/speckit.tasks`를 실행하여 작업 목록을 다시 생성하도록 제안하십시오.

10. **확장 훅 확인**: 완료 검증 후 프로젝트 루트에 `.specify/extensions.yml`이 존재하는지 확인합니다.
    - 존재한다면 이를 읽고 `hooks.after_implement` 키 아래의 항목을 찾습니다.
    - YAML을 파싱할 수 없거나 유효하지 않은 경우, 훅 확인을 조용히 건너뛰고 정상적으로 진행합니다.
    - `enabled`가 명시적으로 `false`인 훅은 제외합니다. `enabled` 필드가 없는 훅은 기본적으로 활성화된 것으로 간주합니다.
    - 남은 각 훅에 대해 `condition` 표현식을 해석하거나 평가하려고 시도하지 마십시오:
      - 훅에 `condition` 필드가 없거나 null/비어 있는 경우, 실행 가능한 훅으로 간주합니다.
