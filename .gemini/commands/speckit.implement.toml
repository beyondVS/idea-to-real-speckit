    - 실행 가능한 각 훅에 대해 `optional` 플래그에 따라 다음을 출력합니다:
      - **선택적 훅** (`optional: true`):
        ```
        ## 확장 훅 (Extension Hooks)

        **선택적 훅**: {extension}
        명령어: `/{command}`
        설명: {description}

        프롬프트: {prompt}
        실행하려면: `/{command}`
        ```
      - **필수 훅** (`optional: false`):
